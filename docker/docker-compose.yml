# ============================================================
# Terminal Blog - Docker Compose 配置
# ============================================================
# 使用方法:
#   1. 在项目根目录创建 Markdown、blogfiles 和 blogimgs 目录
#   2. 放入你的文章、博客文件和博客图片
#   3. 运行: docker-compose -f docker/docker-compose.yml up -d
# ============================================================

services:
  blog:
    # build:
    #   context: ..
    #   dockerfile: docker/Dockerfile
    # container_name: terminal-blog-fs
    # restart: unless-stopped
    image: ieiian/terminal-blog-fs
    container_name: terminal-blog-fs
    restart: unless-stopped
    ports:
      - "8788:8788"
    volumes:
      # 配置目录映射（宿主机 config/ 目录 → 容器 /app/.config/）
      - ../config:/app/.config
      - ../Markdown:/app/Markdown
      - ../blogimgs:/app/blogimgs
      - ../blogfiles:/app/blogfiles
      - ../guestuploads:/app/guestuploads
      - ../.ssh_key:/app/.ssh_key
    environment:
      - SITE_TITLE=TerminalBlog.Docker
      - WELCOME_MESSAGE=欢迎来到我的终端博客docker版本
      - SITE_URL=https://docker.example.com
      - ICP_NUMBER=ICP粤B123docker号
      - ADMIN_USER=admin
      - ADMIN_PASS=admin123
      # MATRIX_RAIN_STARTUP_RANDOM: true/false 是否开启启动随机切换模式
      - MATRIX_RAIN_STARTUP_RANDOM=true
      # 控制算法开关：想用等概率就写 average，想用递减概率就写 decay
      - MATRIX_RAIN_RANDOM_ALGORITHM=decay
      # MATRIX_RAIN_RANDOM_POOL: 当 startup_random 为 true 时，参与随机抽签的候选池(1, 2, 3, 4, 1+2, 1+3...)
      - MATRIX_RAIN_RANDOM_POOL=1,2,3,4,2+3,1+4,1+2+3+4
      # MATRIX_RAIN_FIXED_MODE: 当 startup_random 为 false 时生效(1, 2, 3, 4, 1+2, 1+3...)
      - MATRIX_RAIN_FIXED_MODE=2+3
      # MATRIX_RAIN_ENABLE_BUDDHA_EFFECT: 是否开启“佛”字特效（true/false）
      - MATRIX_RAIN_ENABLE_BUDDHA_EFFECT=true
      # AI 相关
      - AI_ENABLED=${AI_ENABLED:-false}
      - AI_API_FORMAT=${AI_API_FORMAT:-openai}
      - AI_API_BASE_URL=${AI_API_BASE_URL}
      - AI_API_KEY=${AI_API_KEY}
      - AI_MODEL=${AI_MODEL}
      - AI_MAX_TOKENS=${AI_MAX_TOKENS:-2048}
      - AI_TEMPERATURE=${AI_TEMPERATURE:-0.7}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8788/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
