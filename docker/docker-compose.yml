# ============================================================
# Terminal Blog - Docker Compose 配置
# ============================================================
# 使用方法:
#   1. 在项目根目录创建 Markdown 和 download 目录
#   2. 放入你的文章和下载文件
#   3. 运行: docker-compose -f docker/docker-compose.yml up -d
# ============================================================

services:
  blog:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: terminal-blog-fs
    restart: unless-stopped
    ports:
      - "8788:8788"
    volumes:
      - ../Markdown:/app/Markdown
      - ../images:/app/images
      - ../download:/app/download
    environment:
      - SITE_TITLE=TerminalBlog.Docker
      - WELCOME_MESSAGE=欢迎来到我的终端博客docker版本
      - SITE_URL=https://docker.example.com
      - ICP_NUMBER=ICP粤B123docker号
      - ADMIN_USER=admin
      - ADMIN_PASS=admin123
      # MATRIX_RAIN_STARTUP_RANDOM: true/false 是否开启启动随机切换模式
      - MATRIX_RAIN_STARTUP_RANDOM=true
      # MATRIX_RAIN_FIXED_MODE: 当 startup_random 为 false 时生效(1, 2, 3, 4, 1+2, 1+3...)
      - MATRIX_RAIN_FIXED_MODE=1
      # MATRIX_RAIN_RANDOM_POOL: 当 startup_random 为 true 时，参与随机抽签的候选池(1, 2, 3, 4, 1+2, 1+3...)
      - MATRIX_RAIN_RANDOM_POOL=1,1+2,3+4,1+2+3+4
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8788/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s