services:
  terminal-blog:
    image: terminal-blog:latest
    # image: ieiian/terminal-blog:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        # 站点配置（在构建时嵌入 HTML）
        SITE_TITLE: ${SITE_TITLE:-TerminalBlog}
        WELCOME_MESSAGE: ${WELCOME_MESSAGE:-欢迎来到我的终端博客。这里用代码记录世界，用键盘书写思考。}
        SITE_URL: ${SITE_URL:-https://myURL.com}
        ICP_NUMBER: ${ICP_NUMBER:-ICP粤B12345678号}
    container_name: terminal-blog
    ports:
      - "8788:8788"
    volumes:
      - blog-wrangler-state:/app/.wrangler/state
      # Optional: mount local Markdown files for `docker exec terminal-blog npm run import`
      - ../Markdown:/app/Markdown
      # Optional: reserved folder for download/export workflows
      - ../download:/app/download
    environment:
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASS: ${ADMIN_PASS:-admin123}
      PORT: ${PORT:-8788}
      SITE_TITLE: ${SITE_TITLE:-TerminalBlog}
      WELCOME_MESSAGE: ${WELCOME_MESSAGE:-欢迎来到我的终端博客。这里用代码记录世界，用键盘书写思考。}
      SITE_URL: ${SITE_URL:-https://myURL.com}
      ICP_NUMBER: ${ICP_NUMBER:-ICP粤B12345678号}
    restart: unless-stopped

volumes:
  blog-wrangler-state: