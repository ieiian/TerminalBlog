<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Blog</title>
    <script src="/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@3.0.8/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0d1117;
            --bg-card: #161b22;
            --bg-header: #1a1f29;
            --green: #00ff41;
            --green-dim: #00cc33;
            --cyan: #00e5ff;
            --yellow: #ffd700;
            --red: #ff6b6b;
            --purple: #d2a8ff;
            --orange: #ffa657;
            --gray: #8b949e;
            --gray-dim: #484f58;
            --border: #30363d;
            --text: #c9d1d9;
            --terminal-max-width: 900px;
        }

        body {
            font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            font-size: 14px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Matrix rain canvas */
        #matrix-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
            /* 代码雨的整体不透明度，之前从 0.07 调整为 0.05 */
            opacity: 0.05;
        }

        /* Scanline effect */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 65, 0.015) 2px,
                rgba(0, 255, 65, 0.015) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* Blinking cursor */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: var(--green);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        /* Typing animation */
        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        /* Terminal window */
        .terminal {
            position: relative;
            z-index: 1;
            /* max-width: 900px; */
            max-width: var(--terminal-max-width);
            margin: 30px auto;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        /* Title bar */
        .title-bar {
            background: var(--bg-header);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border);
            user-select: none;
            position: relative;
        }
        .title-bar .dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .title-bar .dot:hover { opacity: 0.8; }
        .dot.red { background: #ff5f57; }
        .dot.yellow { background: #febc2e; }
        .dot.green { background: #28c840; }
        .title-bar .title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.85em;
            color: var(--gray);
            white-space: nowrap;
            pointer-events: none;
        }

        /* Terminal body */
        .term-body {
            background: rgba(13, 17, 23, 0.94);
            padding: 24px;
        }

        /* Command prompt */
        .prompt {
            margin-bottom: 8px;
        }
        .prompt .user {
            color: var(--green);
            font-weight: 600;
        }
        .prompt .path {
            color: var(--cyan);
        }
        .prompt .symbol {
            color: var(--gray);
        }
        .prompt .cmd {
            color: var(--text);
        }

        /* Output */
        .output {
            margin: 12px 0 20px;
            padding-left: 0;
        }
        .output p {
            margin-bottom: 6px;
        }

        /* ASCII art */
        .ascii-art {
            font-size: 0.7em;
            line-height: 1.2;
            margin: 20px 0;
            white-space: pre;
            /* 彩虹渐变文字效果 */
            background: linear-gradient(90deg, #00ff41, #00e5ff, #d2a8ff, #ffd700, #00ff41);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: asciiRainbow 6s linear infinite;
            filter: drop-shadow(0 0 8px rgba(0, 255, 65, 0.5));
        }
        @keyframes asciiRainbow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        /* Separator */
        .sep {
            color: var(--gray-dim);
            margin: 20px 0;
            font-size: 0.85em;
        }

        /* Post listing */
        .ls-output {
            margin: 12px 0;
        }
        .ls-row {
            display: grid;
            grid-template-columns: 100px 80px 1fr 80px;
            gap: 12px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(48, 54, 61, 0.5);
            font-size: 0.9em;
        }
        @media (max-width: 600px) {
            .ls-row {
                grid-template-columns: 1fr 80px;
            }
            .ls-row .perm, .ls-row .size { display: none; }
            .ls-row.header span:nth-child(1),
            .ls-row.header span:nth-child(2) { display: none; }
        }
        .ls-row.header {
            color: var(--gray-dim);
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 4px;
        }
        .ls-row .perm { color: var(--gray); }
        .ls-row .size { color: var(--orange); }
        .ls-row .name a {
            color: var(--cyan);
            text-decoration: none;
            transition: color 0.2s;
        }
        .ls-row .name a:hover {
            color: var(--green);
            text-shadow: 0 0 8px rgba(0, 255, 65, 0.3);
        }
        .ls-row .date-col { color: var(--gray); }

        /* Post detail card */
        .post-detail {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin: 16px 0;
            overflow: hidden;
        }
        .post-detail .file-header {
            background: var(--bg-header);
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            font-size: 0.8em;
            border-bottom: 1px solid var(--border);
        }
        .post-detail .file-header .filename {
            color: var(--cyan);
        }
        .post-detail .file-header .lang {
            color: var(--purple);
        }
        .post-detail .file-body {
            padding: 20px;
        }
        .post-detail .file-body h2 {
            color: var(--green);
            font-size: 1.3em;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .post-detail .file-body .meta-line {
            color: var(--gray);
            font-size: 0.8em;
            margin-bottom: 16px;
        }
        .post-detail .file-body .meta-line .tag {
            color: var(--yellow);
        }
        .post-detail .file-body .meta-line .date-highlight {
            color: var(--orange);
        }
        .post-detail .file-body .content-text {
            color: var(--text);
            font-size: 0.9em;
            line-height: 1.8;
            margin-bottom: 16px;
            white-space: pre-wrap;
        }

        /* Markdown rendered content */
        .post-content {
            color: var(--text);
            font-size: 0.9em;
            line-height: 1.9;
        }
        .post-content h1 { color: var(--green); margin: 24px 0 12px; font-size: 1.4em; }
        .post-content h2 { color: var(--green); margin: 20px 0 10px; font-size: 1.2em; }
        .post-content h3 { color: var(--cyan); margin: 16px 0 8px; font-size: 1.05em; }
        .post-content p { margin-bottom: 12px; }
        .post-content a { color: var(--green); text-decoration: none; }
        .post-content a:hover { text-decoration: underline; color: var(--cyan); }
        .post-content code {
            background: var(--bg-header);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.9em;
            color: var(--orange);
        }
        .post-content pre {
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 16px;
            margin: 12px 0;
            overflow-x: auto;
            font-size: 1em;
        }
        .post-content .code-block {
            position: relative;
        }
        .post-content .code-block:hover .copy-btn {
            opacity: 1;
        }
        .post-content .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--gray);
            font-family: inherit;
            font-size: 12px;
            padding: 4px 10px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s, color 0.2s;
            z-index: 1;
        }
        .post-content .copy-btn:hover {
            color: var(--green);
            border-color: var(--green);
        }
        .post-content .copy-btn.copied {
            color: var(--green);
        }

        /* Dark scrollbar */
        * {
            scrollbar-width: thin;
            scrollbar-color: var(--border) var(--bg-card);
        }
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-card);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--gray-dim);
        }
        ::-webkit-scrollbar-corner {
            background: var(--bg-card);
        }
        .post-content pre code {
            background: none;
            padding: 0;
            color: var(--text);
        }
        .post-content blockquote {
            border-left: 3px solid var(--green);
            padding-left: 16px;
            margin: 12px 0;
            color: var(--gray);
        }
        .post-content ul, .post-content ol {
            padding-left: 24px;
            margin-bottom: 12px;
        }
        .post-content li { margin-bottom: 4px; }
        .post-content img {
            max-width: 100%;
            border-radius: 4px;
            border: 1px solid var(--border);
        }
        .post-content hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 20px 0;
        }

        /* Tables */
        .post-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 16px 0;
            font-size: 0.9em;
        }
        .post-content table th,
        .post-content table td {
            border: 1px solid var(--border);
            padding: 8px 12px;
            text-align: left;
        }
        .post-content table th {
            background: var(--bg-header);
            color: var(--green);
        }
        .post-content table tr:nth-child(even) {
            background: var(--bg-card);
        }

        /* Back link */
        .back-link {
            color: var(--green);
            text-decoration: none;
            font-size: 0.85em;
            display: inline-block;
            margin-top: 12px;
        }
        .back-link:hover { text-decoration: underline; }

        /* Tags section */
        .tags-section {
            margin: 20px 0;
        }
        .tag-item {
            display: inline-block;
            padding: 4px 12px;
            margin: 4px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.8em;
            color: var(--text);
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
        }
        .tag-item:hover, .tag-item.active {
            border-color: var(--green);
            color: var(--green);
            background: rgba(0, 255, 65, 0.05);
        }
        .tag-item .count {
            color: var(--gray-dim);
            margin-left: 4px;
        }

        /* Status bar */
        .status-bar {
            background: var(--bg-header);
            border-top: 1px solid var(--border);
            padding: 6px 16px;
            display: flex;
            justify-content: space-between;
            font-size: 0.75em;
            color: var(--gray);
        }
        .status-bar .branch { color: var(--green); }
        .status-bar .mode { color: var(--cyan); }

        /* System info */
        .sysinfo {
            color: var(--gray);
            font-size: 0.8em;
            margin: 12px 0;
        }
        .sysinfo .highlight {
            color: var(--green);
        }
        .sysinfo .warn {
            color: var(--yellow);
        }

        /* Footer terminal */
        .term-footer {
            max-width: 900px;
            margin: 0 auto 30px;
            text-align: center;
            font-size: 0.75em;
            color: var(--gray-dim);
        }
        .term-footer a {
            color: var(--gray);
            text-decoration: none;
        }
        .term-footer a:hover { color: var(--green); }

        /* Highlight effect */
        .glow {
            text-shadow: 0 0 10px currentColor;
        }

        /* Loading */
        .loading {
            color: var(--green);
            font-size: 0.85em;
        }
        .loading::after {
            content: '.';
            animation: dots 1.2s infinite;
        }
        @keyframes dots {
            0%, 100% { content: '.'; }
            33% { content: '..'; }
            66% { content: '...'; }
        }

        /* Error */
        .error-text {
            color: var(--red);
            font-size: 0.85em;
        }

        /* Pagination */
        .pagination {
            margin: 16px 0;
            display: flex;
            gap: 8px;
        }
        .pagination a {
            color: var(--cyan);
            text-decoration: none;
            padding: 4px 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.8em;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pagination a:hover {
            border-color: var(--green);
            color: var(--green);
        }
        .pagination a.active {
            background: var(--green);
            color: var(--bg);
            border-color: var(--green);
        }
        .pagination a.disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        /* Admin panel */
        .admin-section {
            margin: 16px 0;
        }
        .admin-section input,
        .admin-section textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.9em;
            margin-bottom: 8px;
        }
        .admin-section textarea {
            min-height: 200px;
            resize: vertical;
        }
        .admin-section input:focus,
        .admin-section textarea:focus {
            outline: none;
            border-color: var(--green);
        }
        .admin-section label {
            color: var(--gray);
            font-size: 0.8em;
            display: block;
            margin-bottom: 4px;
        }
        .admin-btn {
            background: var(--bg-header);
            color: var(--green);
            border: 1px solid var(--green);
            padding: 8px 20px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.2s;
        }
        .admin-btn:hover {
            background: rgba(0, 255, 65, 0.1);
        }
        .admin-btn.danger {
            color: var(--red);
            border-color: var(--red);
        }
        .admin-btn.danger:hover {
            background: rgba(255, 107, 107, 0.1);
        }
        .admin-btn.cyan {
            color: var(--cyan);
            border-color: var(--cyan);
        }
        .admin-btn.cyan:hover {
            background: rgba(0, 229, 255, 0.1);
        }

        /* Fullscreen editor mode */
        .fullscreen-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9997;
            padding: 30px 0;
            display: flex;
            justify-content: center;
        }
        .fullscreen-overlay .fullscreen-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
        }
        .fullscreen-overlay .fullscreen-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: var(--bg-header);
            border: 1px solid var(--border);
            border-radius: 8px 8px 0 0;
            border-bottom: none;
        }
        .fullscreen-overlay .fullscreen-header span {
            color: var(--green);
            font-size: 0.85em;
        }
        .fullscreen-overlay .fullscreen-header button {
            background: var(--bg-header);
            color: var(--gray);
            border: 1px solid var(--border);
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
        }
        .fullscreen-overlay .fullscreen-header button:hover {
            color: var(--red);
            border-color: var(--red);
        }
        .fullscreen-overlay textarea {
            flex: 1;
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 8px 8px;
            color: var(--text);
            padding: 20px 24px;
            font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
        }
        .fullscreen-overlay textarea:focus {
            outline: none;
            border-color: var(--green);
        }

        /* Preview overlay */
        .preview-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9998;
            overflow-y: auto;
            padding: 30px 16px;
        }

        /* Nav links in terminal */
        .nav-links {
            margin: 12px 0;
        }
        .nav-links a {
            color: var(--cyan);
            text-decoration: none;
            margin-right: 16px;
            font-size: 0.9em;
            cursor: pointer;
            transition: color 0.2s;
        }
        .nav-links a:hover, .nav-links a.active {
            color: var(--green);
        }

        @media (max-width: 768px) {
            .nav-links .nav-break::before {
                content: "\A";
                white-space: pre;
                line-height: 2em; /* 觉得两行太挤的话，用这行来控制上下间距 */
            }
        }

        /* Toast notification */
        #toastContainer {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }
        .toast-bar {
            width: 100%;
            background: var(--bg-header);
            border-bottom: 1px solid var(--border);
            padding: 10px 20px;
            text-align: center;
            color: var(--gray);
            font-size: 0.85em;
            pointer-events: auto;
            animation: toastIn 0.3s ease;
        }
        .toast-bar.fade-out {
            animation: toastOut 1s ease forwards;
        }
        .toast-bar .toast-success { color: var(--green-dim); }
        .toast-bar .toast-error { color: var(--red); }
        .toast-bar .toast-info { color: var(--cyan); }
        .toast-bar .toast-actions {
            margin-top: 8px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        .toast-bar .toast-actions button {
            background: var(--bg);
            color: var(--gray);
            border: 1px solid var(--border);
            padding: 4px 16px;
            border-radius: 3px;
            font-family: inherit;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.2s;
        }
        .toast-bar .toast-actions button:hover {
            border-color: var(--green);
            color: var(--green);
        }
        .toast-bar .toast-actions button.confirm-btn:hover {
            border-color: var(--red);
            color: var(--red);
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes toastOut {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* Git Sync Modal Styles */
        .git-sync-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.94);
            z-index: 9999;
            overflow-y: auto;
            padding: 30px 16px;
        }
        .git-sync-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .git-sync-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: var(--bg-header);
            border: 1px solid var(--border);
            border-radius: 8px 8px 0 0;
            border-bottom: none;
        }
        .git-sync-header span {
            color: var(--green);
            font-size: 0.9em;
            text-shadow: 0 0 5px var(--green);
        }
        .git-sync-header button {
            background: var(--bg-header);
            color: var(--gray);
            border: 1px solid var(--border);
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
        }
        .git-sync-header button:hover {
            color: var(--red);
            border-color: var(--red);
        }
        .git-sync-body {
            background: var(--bg);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 8px 8px;
            padding: 20px;
        }
        .git-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .git-grid {
                grid-template-columns: 1fr;
            }
        }
        .git-panel {
            border: 1px solid rgba(48, 54, 61, 0.6);
            border-radius: 6px;
            padding: 16px;
            background: rgba(13, 17, 23, 0.4);
        }
        .git-panel-title {
            color: var(--cyan);
            font-size: 0.85em;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 6px;
            font-weight: bold;
        }
        .git-panel-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 6px;
        }
        .git-panel-title-row .git-panel-title {
            margin-bottom: 0;
            border-bottom: none;
            padding-bottom: 0;
            flex: 1;
        }
        .git-panel-title-row .git-btn {

        /* ============ AI Chat Styles ============ */
        .ai-btn {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            padding: 4px 12px;
            font-size: 0.85em;
            font-weight: bold;
            /* 彩虹光谱渐变文字 */
            background: linear-gradient(135deg, #00ff41 0%, #00e5ff 20%, #d2a8ff 40%, #ffd700 60%, #00e5ff 80%, #00ff41 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            /* 彩虹流光 + 发光呼吸脉冲 */
            animation: aiRainbowFlow 4s linear infinite, aiGlowPulse 3s ease-in-out infinite;
            user-select: none;
            z-index: 10;
        }
        .ai-btn:hover {
            transform: translateY(-50%) scale(1.18);
        }
        /* 彩虹光谱流光 — 渐变色持续流动 */
        @keyframes aiRainbowFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        /* 发光呼吸脉冲 — 柔和的明灭光晕 */
        @keyframes aiGlowPulse {
            0%, 100% {
                filter: drop-shadow(0 0 2px rgba(0, 255, 65, 0.15));
            }
            50% {
                filter: drop-shadow(0 0 6px rgba(0, 229, 255, 0.45))
                        drop-shadow(0 0 14px rgba(210, 168, 255, 0.2));
            }
        }
        /* AI 辐射波全屏效果画布 */
        #ai-ripple-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9998;
        }

        /* AI Modal */
        .ai-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .ai-modal-window {
            width: 100%;
            /* AI 对话窗口最大宽度，根据需要调整 --terminal-max-width 值为 900px */
            max-width: 800px;
            /* max-width: var(--terminal-max-width); */
            max-height: 85vh;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 40px rgba(0, 255, 65, 0.12);
            animation: slideUp 0.3s ease;
        }
        @media (max-width: 768px) {
            .ai-modal {
                padding: 0;
                align-items: stretch;
                justify-content: stretch;
            }
            .ai-modal-window {
                width: 100%;
                max-width: none;
                height: 100%;
                max-height: none;
                border-radius: 0;
                border: none;
                box-shadow: none;
                animation: fadeIn 0.2s ease;
            }
            .ai-modal-header {
                padding-top: max(12px, env(safe-area-inset-top));
            }
            .ai-modal-footer {
                padding-bottom: max(12px, env(safe-area-inset-bottom));
            }
            .ai-message-content {
                max-width: 85%;
            }
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .ai-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: var(--bg-header);
            border-bottom: 1px solid var(--border);
        }
        .ai-modal-title {
            color: var(--green);
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .ai-modal-title .ai-icon {
            font-size: 1.2em;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .ai-modal-close {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--gray);

    <script>
    // ============ Global Safe Copy Function (Supports HTTP/HTTPS Context) ============
    function copyTextToClipboard(text) {
        return new Promise(function(resolve, reject) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(resolve).catch(reject);
                return;
            }
            try {
                var textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.top = "0";
                textArea.style.left = "0";
                textArea.style.position = "fixed";
                textArea.style.opacity = "0";
                textArea.style.width = "2em";
                textArea.style.height = "2em";
                textArea.style.padding = "0";
                textArea.style.border = "none";
                textArea.style.outline = "none";
                textArea.style.boxShadow = "none";
                textArea.style.background = "transparent";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                var successful = document.execCommand('copy');
                document.body.removeChild(textArea);
                if (successful) {
                    resolve();
                } else {
                    reject(new Error('Copy failed'));
                }
            } catch (err) {
                reject(err);
            }
        });
    }

    // ============ Toast Notification ============
    function showToast(message, type, actions) {
        var container = document.getElementById('toastContainer');
        var toast = document.createElement('div');
        toast.className = 'toast-bar';

        var typeClass = type === 'success' ? 'toast-success' :
                        type === 'error' ? 'toast-error' :
                        type === 'info' ? 'toast-info' : '';

        var html = '<div class="' + typeClass + '">' + message + '</div>';

        if (actions && actions.length > 0) {
            html += '<div class="toast-actions">';
            actions.forEach(function(act, i) {
                var cls = act.confirm ? 'confirm-btn' : '';
                html += '<button class="' + cls + '" data-idx="' + i + '">' + act.label + '</button>';
            });
            html += '</div>';
        }

        toast.innerHTML = html;
        container.appendChild(toast);

        if (actions && actions.length > 0) {
            var btns = toast.querySelectorAll('.toast-actions button');
            btns.forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var idx = parseInt(this.getAttribute('data-idx'));
                    removeToast(toast);
                    if (actions[idx] && actions[idx].action) actions[idx].action();
                });
            });
        } else {
            setTimeout(function() {
                removeToast(toast);
            }, 3000);
        }
    }

    function removeToast(toast) {
        if (!toast || !toast.parentNode) return;
        toast.classList.add('fade-out');
        setTimeout(function() {
            if (toast.parentNode) toast.parentNode.removeChild(toast);
        }, 1000);
    }

    // ============ Markdown Parser (using marked.js) ============
    // Wait for marked to load, then configure it
    function initMarked() {
        if (typeof marked === 'undefined') {
            setTimeout(initMarked, 100);
            return;
        }

        // Configure marked options
        marked.setOptions({
            breaks: true,
            gfm: true
        });

        // Create custom renderer for code blocks with copy button
        const renderer = new marked.Renderer();

        // Override code block rendering
        renderer.code = function(code, language) {
            var lang = language || '';
            var encoded = btoa(unescape(encodeURIComponent(code)));
            return '<div class="code-block"><button class="copy-btn" data-lang="' + lang + '" data-code="' + encoded + '">复制</button><pre><code class="language-' + lang + '">' + escapeHtml(code) + '</code></pre></div>';
        };

        // Override link rendering (open in new tab)
        renderer.link = function(href, title, text) {
            var titleAttr = title ? ' title="' + title + '"' : '';
            return '<a href="' + href + '" target="_blank"' + titleAttr + '>' + text + '</a>';
        };

        // Override image rendering
        renderer.image = function(href, title, text) {
            var titleAttr = title ? ' title="' + title + '"' : '';
            return '<img src="' + href + '" alt="' + (text || '') + '"' + titleAttr + '>';
        };

        // Override table rendering
        renderer.table = function(header, body) {
            return '<div style="overflow-x:auto;"><table class="md-table"><thead>' + header + '</thead><tbody>' + body + '</tbody></table></div>';
        };

        marked.use({ renderer: renderer });
    }

    // Start initialization
    initMarked();

    function parseMarkdown(md) {
        if (!md) return '';
        
        if (typeof marked === 'undefined') {
            return '<pre>' + escapeHtml(md) + '</pre>';
        }
        
        try {
            return marked.parse(md);
        } catch (e) {
            console.error('Markdown parse error:', e);
            return '<pre>' + escapeHtml(md) + '</pre>';
        }
    }

    function escapeHtml(str) {
        return str.replace(/&/g, '&').replace(/</g, '<').replace(/>/g, '>').replace(/"/g, '"').replace(/'/g, '&#039;');
    }

    // ============ API Calls ============
    async function apiGet(path, options) {
        options = options || {};
        const res = await fetch(`/api${path}`, options);
        if (!res.ok) throw new Error(`API Error: ${res.status}`);
        return res.json();
    }

    async function apiPost(path, data) {
        const headers = { 'Content-Type': 'application/json' };
        if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
        const res = await fetch(`/api${path}`, {
            method: 'POST',
            headers,
            body: JSON.stringify(data)
        });
        if (res.status === 401) {
            clearAuth();
            const err = await res.json().catch(() => ({ error: '登录已过期' }));
            throw new Error(err.error || '需要重新登录');
        }
        if (!res.ok) {
            const err = await res.json().catch(() => ({ error: res.statusText }));
            throw new Error(err.error || res.statusText);
        }
        return res.json();
    }

    async function apiDelete(path) {
        const headers = {};
        if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
        const res = await fetch(`/api${path}`, {
            method: 'DELETE',
            headers
        });
        if (res.status === 401) {
            clearAuth();
            throw new Error('需要重新登录');
        }
        if (!res.ok) {
            const err = await res.json().catch(() => ({ error: res.statusText }));
            throw new Error(err.error || `API Error: ${res.status}`);
        }
        return res.json();
    }

    // 从 SITE_CONFIG 读取上传大小上限（字节）
    function getUploadMaxBytes(folder) {
        var cfg = typeof SITE_CONFIG !== 'undefined' ? SITE_CONFIG : {};
        var mb;
        if (folder === 'blogimgs') {
            mb = cfg.maxUploadSizeBlogimgsMB != null ? cfg.maxUploadSizeBlogimgsMB : 10;
        } else if (folder === 'guestupload' || folder === 'guestuploads') {
            mb = cfg.maxUploadSizeGuestMB != null ? cfg.maxUploadSizeGuestMB : 50;
        } else {
            mb = cfg.maxUploadSizeBlogfilesMB != null ? cfg.maxUploadSizeBlogfilesMB : 100;
        }
        mb = Number(mb);
        if (!mb || mb <= 0) {
            if (folder === 'blogimgs') mb = 10;
            else if (folder === 'guestupload' || folder === 'guestuploads') mb = 50;
            else mb = 100;
        }
        return mb * 1024 * 1024;
    }

    function getGuestUploadMaxMB() {
        return Math.round(getUploadMaxBytes('guestupload') / (1024 * 1024));
    }

    function formatBytesHint(bytes) {
        if (bytes >= 1024 * 1024 * 1024) {
            return (bytes / (1024 * 1024 * 1024)).toFixed(1) + ' GB';
        }
        if (bytes >= 1024 * 1024) {
            return Math.round(bytes / (1024 * 1024)) + ' MB';
        }
        if (bytes >= 1024) {
            return Math.round(bytes / 1024) + ' KB';
        }
        return bytes + ' B';
    }

    function getUploadMaxHint(folder) {
        return formatBytesHint(getUploadMaxBytes(folder));
    }

    async function apiPut(path, data) {
        const headers = { 'Content-Type': 'application/json' };
        if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
        const res = await fetch(`/api${path}`, {
            method: 'PUT',

            body: JSON.stringify(data)
        });
        if (res.status === 401) {
            clearAuth();
            const err = await res.json().catch(() => ({ error: '登录已过期' }));
            throw new Error(err.error || '需要重新登录');
        }
        if (!res.ok) {
            const err = await res.json().catch(() => ({ error: res.statusText }));
            throw new Error(err.error || res.statusText);
        }
        return res.json();
    }

    function isLoggedIn() {

    function clearAuth() {
        authToken = null;
        authUser = null;
        localStorage.removeItem('blog_token');
        localStorage.removeItem('blog_user');
    }

    async function doLogin() {
        const username = document.getElementById('loginUser').value.trim();
        const password = document.getElementById('loginPass').value;
        if (!username || !password) {
            showToast('[ERROR] 请输入用户名和密码', 'error');
            return;
        }
        try {
            const result = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            }).then(r => {
                if (!r.ok) return r.json().then(e => { throw new Error(e.error || '登录失败'); });
                return r.json();
            });
            authToken = result.token;
            authUser = result.username;
            localStorage.setItem('blog_token', authToken);
            localStorage.setItem('blog_user', authUser);
            showToast('✅ 登录成功', 'success');
            render();
        } catch (err) {
            showToast('[ERROR] ' + escapeHtml(err.message), 'error');
        }
    }

    async function doLogout() {
        try {
            if (authToken) {
                await fetch('/api/auth/logout', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
            }
        } catch (e) {}
        clearAuth();
        navigate('admin');
    }

    async function checkAuth() {
        if (!authToken) return false;
        try {
            const res = await fetch('/api/auth/verify', {
                headers: { 'Authorization': `Bearer ${authToken}` }
            });
            const data = await res.json();
            if (data.valid) {
                authUser = data.username;
                return true;
            }
            clearAuth();
            return false;
        } catch (e) {
            return false;
        }
    }

    function renderPagination(page, totalPages) {
        let html = '<div class="pagination">';
        html += `<a onclick="goPage(${page - 1})" class="${page <= 1 ? 'disabled' : ''}">← 上一页</a>`;
        for (let i = 1; i <= totalPages; i++) {
            html += `<a onclick="goPage(${i})" class="${i === page ? 'active' : ''}">${i}</a>`;
        }
        html += `<a onclick="goPage(${page + 1})" class="${page >= totalPages ? 'disabled' : ''}">下一页 →</a>`;
        html += '</div>';
        return html;
    }

    async function savePost() {
        const title = document.getElementById('adminTitle').value.trim();
        const tags = document.getElementById('adminTags').value.trim();
        const content = document.getElementById('adminContent').value;
        const id = document.getElementById('adminId').value.trim();

        if (!title || !content) {
            showToast('[ERROR] 标题和内容不能为空', 'error');
            return;
        }

        const postData = {
            title,
            tags: tags ? tags.split(',').map(t => t.trim()).filter(Boolean) : [],
            content
        };

        try {
            let result;
            if (id) {
                // Update existing post
                result = await apiPut('/post/' + id, postData);
                showToast('✅ ' + (result.message || '更新成功'), 'success');
            } else {
                // Create new post
                result = await apiPost('/post', postData);
                showToast('✅ ' + (result.message || '保存成功') + ' (ID: ' + result.id + ')', 'success');
            }
            // Refresh admin post list
            navigate('admin');
        } catch (err) {
            showToast('[ERROR] ' + escapeHtml(err.message), 'error');
        }
    }

    async function verifyLockPassword() {
        var password = document.getElementById('lockPasswordInput').value;
        var id = window.lockPostId;
        if (!id || !password) return;

        try {
            var res = await fetch('/api/post/' + id + '/verify-lock', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: password })
            });
            var data = await res.json();
            if (data.valid) {
                // Mark post as unlocked in session storage
                unlockedPosts[id] = password;
                sessionStorage.setItem('unlocked_posts', JSON.stringify(unlockedPosts));
                closeLockPrompt();
                navigate('post', id);
            } else {
                showToast('❌ 密码错误', 'error');
            }
        } catch (err) {
            showToast('[ERROR] ' + err.message, 'error');
        }
    }

    // ============ Fullscreen Editor ============
    function toggleFullscreen() {
        var existingOverlay = document.getElementById('fullscreenOverlay');
        if (existingOverlay) {
            // Exit fullscreen - restore content
            var textarea = document.getElementById('adminContent');
            var fullscreenTextarea = document.getElementById('fullscreenTextarea');
            if (textarea && fullscreenTextarea) {
                textarea.value = fullscreenTextarea.value;
            }
            document.body.removeChild(existingOverlay);
            return;
        }

        // Enter fullscreen
        var textarea = document.getElementById('adminContent');
        var content = textarea ? textarea.value : '';

        var overlay = document.createElement('div');
        overlay.className = 'fullscreen-overlay';
        overlay.id = 'fullscreenOverlay';
        overlay.innerHTML =
            '<div class="fullscreen-container">' +
                '<div class="fullscreen-header">' +
                    '<span>📝 全屏编辑模式 - 按 Esc 或点击退出</span>' +
                    '<button onclick="toggleFullscreen()">✕ 退出</button>' +
                '</div>' +
                '<textarea id="fullscreenTextarea" placeholder="# 文章内容...">' + escapeHtml(content) + '</textarea>' +
            '</div>';

        document.body.appendChild(overlay);

        // Focus textarea
        setTimeout(function() {
            var ta = document.getElementById('fullscreenTextarea');
            if (ta) {
                ta.focus();
                // Move cursor to end
                ta.selectionStart = ta.selectionEnd = ta.value.length;
            }
        }, 100);

        // Handle Escape key
        document.addEventListener('keydown', exitFullscreenOnEscape);
    }

    function exitFullscreenOnEscape(e) {
        if (e.key === 'Escape') {
            toggleFullscreen();
            document.removeEventListener('keydown', exitFullscreenOnEscape);
        }
    }

    // ============ 导出/导入 (ZIP 格式) ============
    async function exportPosts() {
        try {
            showToast('正在导出文章...', 'info');
            var headers = { 'Content-Type': 'application/json' };
            if (authToken) headers['Authorization'] = 'Bearer ' + authToken;
            var res = await fetch('/api/export', { headers: headers });
            if (!res.ok) {
                var err = await res.json().catch(function() { return { error: '导出失败' }; });
                throw new Error(err.error || '导出失败');
            }
            var blob = await res.blob();
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'terminalblog-export-' + new Date().toISOString().split('T')[0] + '.zip';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('✅ 导出成功 (ZIP 格式)', 'success');
        } catch (err) {
            showToast('[ERROR] ' + escapeHtml(err.message), 'error');
        }
    }

    async function importPosts(event) {
        var file = event.target.files[0];
        if (!file) return;

        var fileName = file.name.toLowerCase();
        var isZip = fileName.endsWith('.zip');
        var isMarkdown = fileName.endsWith('.md');

        try {
            if (isZip) {
                // ZIP 文件导入
                showToast('正在处理 ZIP 文件...', 'info');
                
                // 读取文件为 base64
                var reader = new FileReader();
                reader.onload = function(e) {
                    var base64 = e.target.result;
                    
                    var headers = { 'Content-Type': 'application/json' };
                    if (authToken) headers['Authorization'] = 'Bearer ' + authToken;
                    
                    fetch('/api/import', {
                        method: 'POST',
                        headers: headers,
                        body: JSON.stringify({ base64: base64 })
                    }).then(function(res) {
                        return res.json();
                    }).then(function(result) {
                        if (result.error) {
                            showToast('[ERROR] ' + escapeHtml(result.error), 'error');
                        } else {
                            showToast('✅ 导入完成 (成功: ' + result.imported + ', 跳过: ' + result.skipped + ', 失败: ' + result.failed + ')', 'success');
                            loadAdminPosts();
                        }
                    }).catch(function(err) {
                        showToast('[ERROR] ' + escapeHtml(err.message), 'error');
                    });
                };
                reader.readAsDataURL(file);
            } else if (isMarkdown) {
                // 单个 Markdown 文件导入 - 直接发送文本内容
                var text = await file.text();
                var headers = { 'Content-Type': 'application/json' };
                if (authToken) headers['Authorization'] = 'Bearer ' + authToken;
                
                showToast('正在导入 Markdown 文件...', 'info');
                
                var res = await fetch('/api/import-markdown', {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({ content: text, filename: file.name })
                });
                var result = await res.json();
                if (result.error) {
                    showToast('[ERROR] ' + escapeHtml(result.error), 'error');
                } else {
                    showToast('✅ 导入完成 (成功: ' + result.imported + ', 跳过: ' + result.skipped + ', 失败: ' + result.failed + ')', 'success');
                    loadAdminPosts();
                }
            } else {
                // 尝试作为 JSON 处理（向后兼容）
                var text = await file.text();
                var data = JSON.parse(text);
                if (data.posts && Array.isArray(data.posts)) {
                    showToast('确认导入？所有文章将被重新分配新的 ID。', 'info', [
                        { label: '确认', confirm: true, action: function() { doImport(data); } },
                        { label: '取消', action: function() {} }
                    ]);
                } else {
                    throw new Error('不支持的文件格式，请上传 .zip 或 .md 文件');
                }
            }
        } catch (err) {
            showToast('[ERROR] ' + escapeHtml(err.message), 'error');
        }
        event.target.value = '';
    }

    async function doImport(data) {
        try {
            var headers = { 'Content-Type': 'application/json' };
            if (authToken) headers['Authorization'] = 'Bearer ' + authToken;
            var res = await fetch('/api/import', {
                method: 'POST',
                headers: headers,
                body: JSON.stringify(data)
            });
            var result = await res.json();
            if (!res.ok) {
                throw new Error(result.error || '导入失败');
            }
            showToast('✅ ' + escapeHtml(result.message) + ' (成功: ' + result.imported + ', 失败: ' + result.failed + ', 总计: ' + result.total + ')', 'success');
            loadAdminPosts();
        } catch (err) {
            showToast('[ERROR] ' + escapeHtml(err.message), 'error');
        }
    }

        if (hasActiveModal()) {
            closeAllModals();
            // 恢复 URL 到当前页面应有的状态
            var expectedUrl = getExpectedUrl();
            history.replaceState(null, '', expectedUrl);
            return;
        }
        
        var path = window.location.pathname;
        var search = window.location.search;
        
        // 解析 URL 并恢复对应视图
        var postMatch = path.match(/^\/(\d+)\/?$/);
        var params = new URLSearchParams(search);
        var view = params.get('view');
        var tag = params.get('tag');
        
        if (postMatch) {
            // 文章详情页
            var postId = postMatch[1];
            currentView = 'post';
            currentSlug = postId;
            render();
        } else if (view === 'tags') {

        } else if (view === 'tag' && tag) {

            render();
        } else if (view === 'admin') {

            currentTag = null;
            render();

            render();
        }

    // ============ Matrix Rain Background ============
    (function() {
        var canvas = document.getElementById('matrix-bg');
        if (!canvas) return;
        var ctx = canvas.getContext('2d');
        
        var cols, drops;
        var fontSize = 11;
        var hue = 140; // 经典的黑客绿

        // 检测是否为移动端
        var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        var clearAlpha = isMobile ? 0.03 : 0.005;

        // 映射基础字符集
        var BASE_SETS = {
            '1': 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン',
            '2': '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            '3': '01',
            '4': '一二三四五六七八九十零甲乙丙丁戊己庚辛壬癸子丑寅卯辰巳午未申酉戌亥临兵斗者皆阵列在前天地神佛'
        };

        // 获取全局配置
        var config = window.SITE_CONFIG || {};
        var isStartupRandom = config.matrixRainStartupRandom === true || config.matrixRainStartupRandom === 'true';
        var fixedMode = String(config.matrixRainFixedMode || '1');

        // 【新增参数控制】随机算法模式: 'average'(等概率) / 'decay'(指数递减概率)
        var randomAlgorithm = config.matrixRainRandomAlgorithm || 'average';

        // 默认兜底数组（为了体现梯度递减，默认池子可以配置更长，供算法筛选）
        var rainRandomPool = ['1', '2', '3', '4', '2+3', '1+4', '1+2+3+4']; 

        // 九字真言，作为特殊符号单独处理，增加辨识度和趣味性
        var spellChars = '临兵斗者皆阵列在前';

        // 佛字单独成一档，触发特殊效果
        var buddhaChar = '佛';
        var enableBuddhaEffect = config.matrixRainEnableBuddhaEffect === true || config.matrixRainEnableBuddhaEffect === 'true'; 

        if (config.matrixRainRandomPool) {
            if (Array.isArray(config.matrixRainRandomPool)) {
                rainRandomPool = config.matrixRainRandomPool;
            } else if (typeof config.matrixRainRandomPool === 'string') {
                rainRandomPool = config.matrixRainRandomPool.split(',');
            }
        }
        var activeMode = '1'; 

        if (!isStartupRandom) {
            activeMode = fixedMode;
        } else {
            var lastMode = sessionStorage.getItem('matrix_rain_last_mode');
            
            var filteredPool = rainRandomPool.filter(function(mode) {
                var modeStr = typeof mode === 'string' ? mode.trim() : String(mode);
                var lastModeStr = lastMode ? lastMode.trim() : '';
                return modeStr !== lastModeStr;
            });
            
            if (filteredPool.length === 0) {
                filteredPool = rainRandomPool;
            }

            // 核心算法分流层
            var chosenMode = filteredPool[0]; // 默认兜底选第一个

            if (randomAlgorithm === 'decay' && filteredPool.length > 1) {
                var index = 0;
                var maxIndex = filteredPool.length - 1;
                
                while (Math.random() < 0.50 && index < maxIndex) {
                    index++;
                }
                chosenMode = filteredPool[index];
            } else {
                chosenMode = filteredPool[Math.floor(Math.random() * filteredPool.length)];
            }

            activeMode = typeof chosenMode === 'string' ? chosenMode.trim() : String(chosenMode);
            sessionStorage.setItem('matrix_rain_last_mode', activeMode);
        }
        console.log('当前雨幕运行模式确定为:', activeMode, '【使用的是 ' + randomAlgorithm + ' 随机算法】');

        function getMixedChars(modeString) {
            var parts = modeString.split('+');
            var combined = '';
            for (var i = 0; i < parts.length; i++) {
                var key = parts[i].trim();
                if (BASE_SETS[key]) {
                    combined += BASE_SETS[key];
                }
            }
            return combined || BASE_SETS['1'];
        }
        var cachedCharPool = getMixedChars(activeMode);

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            var newCols = Math.floor(canvas.width / fontSize);
            var oldDrops = drops || [];
            drops = [];
            for (var i = 0; i < newCols; i++) {
                if (oldDrops[i]) {
                    drops[i] = oldDrops[i];
                } else {
                    drops[i] = {
                        y: Math.random() * -100,
                        speed: 0.12 + Math.random() * 0.22,
                        currentChar: cachedCharPool[Math.floor(Math.random() * cachedCharPool.length)],
                        lastRow: -1,
                        brightness: 0.35
                    };
                }
            }
            cols = newCols;
        }
        resize();
        window.addEventListener('resize', resize);

        function draw() {
            ctx.fillStyle = 'rgba(13, 17, 23, ' + clearAlpha + ')';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = fontSize + 'px "JetBrains Mono", monospace';
            for (var i = 0; i < cols; i++) {
                var drop = drops[i];
                drop.y += drop.speed;
                var row = Math.floor(drop.y);
                if (row !== drop.lastRow) {
                    drop.lastRow = row;
                    drop.currentChar = cachedCharPool[Math.floor(Math.random() * cachedCharPool.length)];
                }
                if (Math.random() > 0.90) {
                    drop.brightness = 1.0; 
                } else {
                    drop.brightness += (0.35 - drop.brightness) * 0.08; 
                }

                // var isSpell = '临兵斗者皆阵列在前'.indexOf(drop.currentChar) !== -1;
                var isSpell = spellChars.indexOf(drop.currentChar) !== -1;
                // var isBuddha = enableBuddhaEffect && drop.currentChar === '佛';
                var isBuddha = enableBuddhaEffect && drop.currentChar === buddhaChar;

                if (isBuddha) {
                    ctx.save();
                    ctx.fillStyle = '#FFFFFF';
                    ctx.shadowColor = 'rgba(255, 215, 0, 1)';
                    ctx.shadowBlur = 15;
                    ctx.font = 'bold ' + (fontSize + 1) + 'px monospace';
                    ctx.fillText(drop.currentChar, i * fontSize, row * fontSize);
                    ctx.restore();
                } else if (isSpell) {
                    ctx.fillStyle = 'hsla(45, 100%, 70%, 1)';
                    ctx.fillText(drop.currentChar, i * fontSize, row * fontSize);
                } else {
                    var lightness = 45 + drop.brightness * 55;
                    var alpha = drop.brightness * 0.85;
                    ctx.fillStyle = 'hsla(' + hue + ', 100%, ' + lightness + '%, ' + alpha + ')';
                    ctx.fillText(drop.currentChar, i * fontSize, row * fontSize);
                }

                if (drop.y * fontSize > canvas.height && Math.random() > 0.975) {
                    drop.y = 0;
                    drop.lastRow = -1;
                    drop.speed = 0.12 + Math.random() * 0.22;
                    drop.brightness = 0.35;
                }
            }
        }
        function tick() {
            draw();
            requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
    })();

        var list = loadGuestUploadRecords();
        list.unshift({
            id: Date.now() + '_' + Math.random().toString(36).slice(2, 8),
            fileName: entry.fileName || '未知文件',

    function formatGuestUploadTime(iso) {
        try {
            return new Date(iso).toLocaleString('zh-CN', { hour12: false });
        } catch (e) {
            return iso || '';
        }
    }

    function renderGuestUploadHistory() {
        var container = document.getElementById('guestUploadHistoryList');
        if (!container) return;
        var records = loadGuestUploadRecords();
        if (!records.length) {
            container.innerHTML = '<div class="file-empty">暂无上传记录</div>';
            return;
        }
        container.innerHTML = records.map(function(record) {
            var isSuccess = record.status === 'success';
            var statusText = isSuccess ? '成功' : '失败';
            var metaLines = [
                '时间：' + formatGuestUploadTime(record.uploadedAt),
                record.sizeHint ? '大小：' + escapeHtml(record.sizeHint) : ''
            ];
            if (isSuccess && record.savedName && record.savedName !== record.fileName) {
                metaLines.push('保存为：' + escapeHtml(record.savedName));
            }
            if (isSuccess && record.url) {
                metaLines.push('链接：' + escapeHtml(record.url));
            }
            if (!isSuccess && record.message) {
                metaLines.push('原因：' + escapeHtml(record.message));
            }
            var actions = '';
            if (isSuccess && record.url) {
                actions = '<button class="file-item-btn" onclick="copyFileUrl(\'' + escapeHtml(record.url) + '\')" title="复制链接">📋</button>';
            }
            return '<div class="guest-upload-history-item ' + (isSuccess ? 'success' : 'failed') + '">' +
                '<div class="guest-upload-history-main">' +
                    '<div class="guest-upload-history-name" title="' + escapeHtml(record.fileName) + '">' + escapeHtml(record.fileName) + '</div>' +
                    '<div class="guest-upload-history-meta">' + metaLines.filter(Boolean).join('<br/>') + '</div>' +
                '</div>' +
                '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">' +
                    '<span class="guest-upload-history-status ' + (isSuccess ? 'success' : 'failed') + '">' + statusText + '</span>' +
                    actions +
                '</div>' +
            '</div>';
        }).join('');
    }

    async function confirmGuestUploadWithCode() {
        var input = document.getElementById('uploadCodeInput');
        var code = input ? input.value.trim().toUpperCase() : '';
        if (!/^[A-Z0-9]{8}$/.test(code)) {
            showToast('[ERROR] 请输入 8 位大写字母或数字组成的上传码', 'error');
            return;
        }
        if (!pendingGuestUploadFile) {
            showToast('[ERROR] 未选择文件', 'error');
            closeUploadCodePrompt();
            return;
        }
        closeUploadCodePrompt();
        var uploadFile = pendingGuestUploadFile;
        var sizeHint = formatBytesHint(uploadFile.size || 0);
        try {
            var result = await uploadGuestFile(uploadFile, code, function(loaded) {
                var total = uploadFile.size || 1;
                var percent = Math.round((Math.min(loaded, total) / total) * 100);
                updateUploadProgress('guestupload', {
                    active: true,
                    percent: percent,
                    name: '上传中: ' + uploadFile.name
                });
            });
            var fileUrl = result && result.url
                ? (result.url.startsWith('http') ? result.url : window.location.origin + result.url)
                : '';
            addGuestUploadRecord({
                fileName: uploadFile.name,
                savedName: result && result.filename ? result.filename : '',
                sizeHint: sizeHint,
                status: 'success',
                message: result && result.message ? result.message : '上传成功',
                url: fileUrl
            });
            updateUploadProgress('guestupload', {
                active: true,
                done: true,
                percent: 100,
                name: '上传完成'
            });
            setTimeout(function() {
                updateUploadProgress('guestupload', { active: false });
            }, 1800);
            pendingGuestUploadFile = null;
        } catch (err) {
            addGuestUploadRecord({
                fileName: uploadFile.name,
                sizeHint: sizeHint,
                status: 'failed',
                message: err && err.message ? err.message : '上传失败'
            });
            updateUploadProgress('guestupload', {
                active: true,
                error: true,
                percent: 0,
                name: '上传失败'
            });
            pendingGuestUploadFile = null;
        }
    }

    function uploadGuestFile(file, uploadCode, onProgress) {
        return new Promise(function(resolve, reject) {
            var formData = new FormData();
            formData.append('file', file);
            formData.append('uploadCode', uploadCode);

            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/guest-upload', true);
            xhr.upload.onprogress = function(event) {
                if (typeof onProgress === 'function') {
                    onProgress(event.lengthComputable ? event.loaded : 0);
                }
            };
            xhr.onload = function() {
                var result = null;
                try {
                    result = JSON.parse(xhr.responseText);
                } catch (e) {}
                if (xhr.status < 200 || xhr.status >= 300) {
                    var errMsg = result && result.error ? result.error : '上传失败 (HTTP ' + xhr.status + ')';
                    showToast('[ERROR] ' + escapeHtml(errMsg), 'error');
                    reject(new Error(errMsg));
                    return;
                }
                showToast('✅ ' + file.name + ' 上传成功', 'success');
                resolve(result);
            };
            xhr.onerror = function() {
                showToast('[ERROR] 上传请求出错', 'error');
                reject(new Error('上传请求出错'));
            };
            xhr.send(formData);
        });
    }

        if (area) {

    async function uploadMultipleFiles(files, folder) {
        var maxBytes = getUploadMaxBytes(folder);
        var maxHint = getUploadMaxHint(folder);
        for (var j = 0; j < files.length; j++) {
            if ((files[j].size || 0) > maxBytes) {
                showToast('[ERROR] ' + files[j].name + ' 超过大小限制（最大 ' + maxHint + '）', 'error');
                return;
            }
        }

        var totalBytes = 0;
        for (var i = 0; i < files.length; i++) {
            totalBytes += files[i].size || 0;
        }
        var completedBytes = 0;
        var totalCount = files.length;
        var failedCount = 0;
        updateUploadProgress(folder, {
            active: true,
            percent: 0,
            name: '准备上传 ' + totalCount + ' 个文件'
        });

        for (var i = 0; i < files.length; i++) {
            var file = files[i];
            try {
                await uploadFile(file, folder, function(loaded) {
                    var currentLoaded = Math.min(loaded || 0, file.size || 0);
                    var percent = totalBytes > 0 ? Math.round(((completedBytes + currentLoaded) / totalBytes) * 100) : 0;
                    updateUploadProgress(folder, {
                        active: true,
                        percent: percent,
                        name: '上传中 ' + (i + 1) + '/' + totalCount + ': ' + file.name
                    });
                });
                completedBytes += file.size || 0;
                var donePercent = totalBytes > 0 ? Math.round((completedBytes / totalBytes) * 100) : 100;
                updateUploadProgress(folder, {
                    active: true,
                    percent: donePercent,
                    name: '已完成 ' + (i + 1) + '/' + totalCount + ': ' + file.name
                });
            } catch (err) {
                console.error('上传文件失败:', file.name, err);
                failedCount++;
                updateUploadProgress(folder, {
                    active: true,
                    error: true,
                    percent: totalBytes > 0 ? Math.round((completedBytes / totalBytes) * 100) : 0,
                    name: '上传失败: ' + file.name
                });
            }
        }
        if (failedCount > 0) {
            updateUploadProgress(folder, {
                active: true,
                error: true,
                percent: totalBytes > 0 ? Math.round((completedBytes / totalBytes) * 100) : 0,
                name: '上传完成，成功 ' + (totalCount - failedCount) + ' 个，失败 ' + failedCount + ' 个'
            });
        } else {
            updateUploadProgress(folder, {
                active: true,
                done: true,
                percent: 100,
                name: '上传完成'
            });
            setTimeout(function() {
                updateUploadProgress(folder, { active: false });
            }, 1800);
        }
        loadFileLists();
    }

        event.target.value = '';

    function updateUploadProgress(folder, state) {
        var progress = document.getElementById(folder + 'UploadProgress');
        if (!progress) return;
        
        var bar = progress.querySelector('.file-upload-progress-bar');
        var name = progress.querySelector('.file-upload-progress-name');
        var percentLabel = progress.querySelector('.file-upload-progress-percent');
        var percent = Math.max(0, Math.min(100, state.percent || 0));
        
        progress.classList.toggle('active', !!state.active);
        progress.classList.toggle('error', !!state.error);
        progress.classList.toggle('done', !!state.done);
        if (name && state.name) name.textContent = state.name;
        if (percentLabel) percentLabel.textContent = percent + '%';
        if (bar) bar.style.width = percent + '%';
    }
    
    async function uploadFile(file, folder, onProgress) {
        var maxBytes = getUploadMaxBytes(folder);
        var maxHint = getUploadMaxHint(folder);
        if ((file.size || 0) > maxBytes) {
            var sizeErr = file.name + ' 超过大小限制（最大 ' + maxHint + '）';
            showToast('[ERROR] ' + sizeErr, 'error');
            return Promise.reject(new Error(sizeErr));
        }

        return new Promise(function(resolve, reject) {
            var formData = new FormData();
            formData.append('file', file);
            
            var headers = {};
            if (authToken) headers['Authorization'] = 'Bearer ' + authToken;
            
            showToast('正在上传: ' + file.name, 'info');

            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/upload/' + folder, true);
            Object.keys(headers).forEach(function(key) {
                xhr.setRequestHeader(key, headers[key]);
            });
            xhr.upload.onprogress = function(event) {
                if (typeof onProgress === 'function') {
                    onProgress(event.lengthComputable ? event.loaded : 0, event.total || file.size || 0);
                }
            };
            xhr.onload = function() {
                var contentType = xhr.getResponseHeader('content-type') || '';
                var result = null;
                if (contentType.includes('application/json')) {
                    try {
                        result = JSON.parse(xhr.responseText);
                    } catch (e) {
                        reject(new Error('服务器返回了无效 JSON 数据'));
                        return;
                    }
                }
                if (xhr.status < 200 || xhr.status >= 300) {
                    var errMsg = result && result.error ? result.error : '上传失败 (HTTP ' + xhr.status + ')';
                    showToast('[ERROR] ' + escapeHtml(errMsg), 'error');
                    reject(new Error(errMsg));
                    return;
                }
                if (!result) {
                    reject(new Error('服务器未返回 JSON 数据，可能上传路径不正确或服务出错'));
                    return;
                }
                if (result.error) {
                    showToast('[ERROR] ' + escapeHtml(result.error), 'error');
                    reject(new Error(result.error));
                } else {
                    showToast('✅ ' + file.name + ' 上传成功', 'success');
                    resolve(result);
                }
            };
            xhr.onerror = function() {
                var err = new Error('上传请求出错');
                showToast('[ERROR] ' + escapeHtml(err.message), 'error');
                reject(err);
            };
            xhr.send(formData);
        });
    }

    async function doDeleteFile(folder, filename) {

    function detectRepoType(url) {
        var sshTrigger = document.getElementById('gitSshTrigger');
        var sshArea = document.getElementById('gitSshArea');
        if (!sshTrigger) return;
        if (url && (url.includes('git@') || url.includes('ssh://'))) {
            sshTrigger.style.display = 'flex';
        } else {
            sshTrigger.style.display = 'none';
            if (sshArea) {
                sshArea.style.display = 'none';
                sshTrigger.classList.remove('active');
                var iconSpan = sshTrigger.querySelector('.icon');
                if (iconSpan) iconSpan.innerText = '▶';
            }
        }
    }
    
    function toggleSshCollapse() {
        var sshArea = document.getElementById('gitSshArea');
        var sshTrigger = document.getElementById('gitSshTrigger');
        if (!sshArea || !sshTrigger) return;
        
        var iconSpan = sshTrigger.querySelector('.icon');
        if (sshArea.style.display === 'none') {
            sshArea.style.display = 'block';
            sshTrigger.classList.add('active');
            if (iconSpan) iconSpan.innerText = '▼';
        } else {
            sshArea.style.display = 'none';
            sshTrigger.classList.remove('active');
            if (iconSpan) iconSpan.innerText = '▶';
        }
    }
    
    async function loadGitSyncConfig() {
        try {
            var config = await apiGet('/git/config');
            if (config) {
                document.getElementById('gitUser').value = config.githubUser || '';
                document.getElementById('gitRepoUrl').value = config.repositoryUrl || '';
                document.getElementById('gitBranch').value = config.branch || 'markdown';
                detectRepoType(config.repositoryUrl);
                
                if (config.sshPublicKey) {
                    document.getElementById('gitSshKey').innerText = config.sshPublicKey;
                }
            }
        } catch (err) {
            writeTerminalLog('stderr', '[ERROR] 获取 Git 配置失败: ' + err.message);
        }
    }
    
    async function saveGitSyncConfig() {
        var user = document.getElementById('gitUser').value.trim();
        var repoUrl = document.getElementById('gitRepoUrl').value.trim();
        var branchName = document.getElementById('gitBranch').value.trim();
        
        if (!repoUrl) {
            showToast('远程仓库 URL 不能为空', 'error');
            return;
        }
        
        try {
            showToast('正在保存配置...', 'info');
            var result = await apiPost('/git/config', {
                githubUser: user,
                repositoryUrl: repoUrl,
                isPrivate: repoUrl.includes('git@'),
                branch: branchName || 'markdown'
            });
            showToast('✅ 配置保存成功', 'success');
            
            if (result.config) {
                if (result.config.sshPublicKey) {
                    document.getElementById('gitSshKey').innerText = result.config.sshPublicKey;
                    detectRepoType(repoUrl);
                }
                if (result.config.branch) {
                    document.getElementById('gitBranch').value = result.config.branch;
                }
            }
        } catch (err) {
            showToast('保存配置失败: ' + err.message, 'error');
        }
    }
