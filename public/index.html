<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Blog</title>
    <script src="/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@3.0.8/marked.min.js"></script>
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="stylesheet" href="/styles/tagStyles.css">
</head>
<body>
    <!-- SVG 渐变定义 - 用于广告灯特效 -->
    <svg width="0" height="0" style="position: absolute;">
        <defs>
            <linearGradient id="adlight-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#ff3333"/>
                <stop offset="14.3%" stop-color="#ff9933"/>
                <stop offset="28.6%" stop-color="#ffcc00"/>
                <stop offset="42.9%" stop-color="#33ff66"/>
                <stop offset="57.1%" stop-color="#3399ff"/>
                <stop offset="71.4%" stop-color="#cc66ff"/>
                <stop offset="85.7%" stop-color="#ff00ff"/>
                <stop offset="100%" stop-color="#ff3333"/>
            </linearGradient>
        </defs>
    </svg>

    <canvas id="matrix-bg"></canvas>
    <canvas id="ai-ripple-canvas"></canvas>
    <div id="toastContainer"></div>

    <div class="terminal">
            <div class="title-bar">
            <div class="dot red" onclick="navigate('home')"></div>
            <div class="dot yellow" onclick="minimizeTerminal()"></div>
            <div class="dot green" onclick="refreshWithEffect()"></div>
            <div class="title" id="titleBar">loading...</div>
            <div class="ai-btn" id="aiBtn" onclick="openAIModal()" title="AI 助手">✨ AI</div>
        </div>

        <div class="term-body" id="termBody">
            <div class="loading"></div>
        </div>

        <div class="status-bar">
            <div>
                <span class="branch">⎇ main</span> · TerminalBlog
            </div>
            <div>
                <span class="mode" id="statusMode">NORMAL</span> · utf-8 · markdown
            </div>
        </div>
    </div>

    <div class="term-footer">
        <p>© 2026 TerminalBlog · 终端黑客风格 · Powered by TSE</p>
        <p style="margin-top: 8px; color: var(--gray-dim);">$ echo "Stay hungry, stay hacking."</p>
        <div id="siteFooter" style="font-size: 0.85em; opacity: 0.8; border-top: 1px dashed rgba(255,255,255,0.15); margin-top: 10px; padding-top: 8px; color: var(--gray-dim);"></div>
    </div>

    <!-- Core Modules -->
    <script src="/js/core/utils.js"></script>
    <script src="/js/core/app.js"></script>
    <script src="/js/core/api.js"></script>

    <!-- Features Modules (依赖 Core) -->
    <script src="/js/features/tagEffects.js"></script>
    <script src="/js/features/terminal-dots.js"></script>
    <script src="/js/features/ai-chat.js"></script>
    <script src="/js/features/effects.js"></script>

    <!-- Posts Modules -->
    <script src="/js/posts/auth.js"></script>
    <script src="/js/posts/preview.js"></script>
    <script src="/js/posts/export.js"></script>

    <!-- Files Modules -->
    <script src="/js/files/guest-upload.js"></script>
    <script src="/js/files/file-manager.js"></script>
    <script src="/js/files/git-sync.js"></script>
    
    <!-- Main Entry - Routing -->
    <script src="/js/posts/routing.js"></script>
</body>
</html>
