    async function runGitCompareCheck() {
        if (isSyncing) return;

        setSyncingState(true);
        clearTerminal();
        writeTerminalLog('info', '正在执行本地与远程文件对比检查（只读，不会修改任何文件）...');

        try {
            var response = await fetch('/api/git/compare', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': authToken ? 'Bearer ' + authToken : ''
                },
                body: JSON.stringify({})
            });
            var result = await response.json();

            await renderLogsGradually(result.logs || []);

            if (!response.ok || !result.success) {
                if (result.report) {
                    renderGitCompareReport(result.report, true);
                }
                showToast('❌ 对比检查未完成：' + (result.error || '请查看终端输出'), 'error');
                return;
            }

            setTimeout(function() {
                writeTerminalLog('stdout', '\n📊 ' + (result.message || '对比检查完成'));
                if (result.report) {
                    renderGitCompareReport(result.report, false);
                }
                showToast('📊 对比检查完成', 'success');
            }, (result.logs || []).length * 150 + 100);
        } catch (err) {
            writeTerminalLog('stderr', '[ERROR] 对比检查通信异常: ' + err.message);
            showToast('❌ 对比检查失败', 'error');
        } finally {
            setTimeout(function() {
                setSyncingState(false);
            }, 500);
        }
    }

    function renderGitCompareReport(report, partial) {
        if (!report) return;

        var lines = [];
        lines.push('════════ 文件对比报告 ' + (partial ? '(部分数据) ' : '') + '════════');
        if (report.branch) {
            lines.push('对比分支: origin/' + report.branch);
        }
        lines.push('本地文件总数: ' + (report.localCount ?? 0));
        lines.push('远程文件总数: ' + (report.remoteCount ?? 0));
        lines.push('路径重复（两边都有）: ' + (report.bothCount ?? 0));
        if (report.identicalCount !== undefined) {
            lines.push('  ├─ 内容相同: ' + report.identicalCount);
            lines.push('  └─ 内容不同: ' + (report.contentDiffCount ?? 0));
        }
        lines.push('仅存在于本地: ' + (report.localOnlyCount ?? 0));
        lines.push('仅存在于远程: ' + (report.remoteOnlyCount ?? 0));

        function appendList(title, items, maxShow) {
            if (!items || !items.length) return;
            lines.push('');
            lines.push(title + ' (' + items.length + '):');
            var show = items.slice(0, maxShow || 30);
            show.forEach(function(f) {
                lines.push('  • ' + f);
            });
            if (items.length > show.length) {
                lines.push('  ... 另有 ' + (items.length - show.length) + ' 个未列出');
            }
        }

        appendList('仅本地文件', report.localOnly);
        appendList('仅远程文件', report.remoteOnly);
        if (report.contentDiff && report.contentDiff.length) {
            lines.push('');
            lines.push('路径重复但内容不同 (' + report.contentDiff.length + '):');
            report.contentDiff.slice(0, 20).forEach(function(item) {
                lines.push('  • ' + item.path + (item.reason ? ' — ' + item.reason : ''));
            });
            if (report.contentDiff.length > 20) {
                lines.push('  ... 另有 ' + (report.contentDiff.length - 20) + ' 个未列出');
            }
        }
        appendList('路径重复且内容相同', report.identical, 15);

        lines.push('════════════════════════════════════');
        lines.forEach(function(line) {
            writeTerminalLog('info', line);
        });
    }

    function confirmGitSync(action) {
        if (isSyncing) return;
        
        if (action === 'push') {
            showToast('⚠️ 【高危操作】确定要用【本地文章】彻底强推覆盖【远程仓库】吗？远程的所有文件将被全部擦除！', 'warning', [
                { label: '🔥 确认强制推送覆盖', confirm: true, action: function() { doGitSync('push'); } },
                { label: '取消', action: function() {} }
            ]);
        } else if (action === 'pull') {
            showToast('⚠️ 【最高危操作】确定要用【远程仓库】强行覆盖【本地文章】吗？本地所有未保存的修改将被擦除且不可挽回！', 'warning', [
                { label: '💥 确认强制擦除重置', confirm: true, action: function() { doGitSync('pull'); } },
                { label: '取消', action: function() {} }
            ]);
        } else if (action === 'remoteToLocalRemoteFirst') {
            showToast('⚠️ 确定要执行【远程增量至本地（远程）】吗？本地同名文件会被远程版本覆盖，本地独有文件会保留。', 'warning', [
                { label: '确认远程增量', confirm: true, action: function() { doGitSync('remoteToLocalRemoteFirst'); } },
                { label: '取消', action: function() {} }
            ]);
        } else {
            // 远程增加至本地，本地同名文件优先保留
            doGitSync('remoteToLocalLocalFirst');
        }
    }
    
    async function doGitSync(action) {
        setSyncingState(true);
        clearTerminal();
        writeTerminalLog('info', '正在准备 Git 同步动作: ' + getGitActionLabel(action) + '...');
        writeTerminalLog('info', '与远程 GitHub 握手，开始收集变更日志，这需要一些时间，请稍候...');
        
        try {
            var response = await fetch('/api/git/sync', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': authToken ? 'Bearer ' + authToken : ''
                },
                body: JSON.stringify({ action: action })
            });
            
            var result = await response.json();
            
            if (response.status === 409 && result.conflict) {
                // 发生合并冲突
                await renderLogsGradually(result.logs || []);
                setTimeout(function() {
                    writeTerminalLog('stderr', '\n❌ [MERGE CONFLICT] 发生了合并冲突！');
                    writeTerminalLog('stderr', '冲突文章列表如下，需手动核查：');
                    (result.conflictFiles || []).forEach(function(file) {
                        writeTerminalLog('stderr', '  ➔ ' + file);
                    });
                    writeTerminalLog('info', '\n提示：合并已安全且保护性地自动撤销，您的工作区毫发无损。\n建议：您可以选择“本地覆盖远程(Push)”以本地为准，或者“远程覆盖本地(Pull)”以远程为准解决冲突。');
                    showToast('⚠️ 合并冲突，已自动安全撤销并还原工作区。', 'error');
                }, (result.logs || []).length * 150 + 100);
                
            } else if (!response.ok) {
                await renderLogsGradually(result.logs || [{ type: 'stderr', text: result.error || '服务器同步发生故障' }]);
                showToast('❌ 同步动作失败，请查看终端输出', 'error');
            } else {
                // 成功
                await renderLogsGradually(result.logs || []);
                setTimeout(function() {
                    writeTerminalLog('stdout', '\n🎉 ' + (result.message || '远程同步成功完成！'));
                    showToast('🎉 同步成功！', 'success');
                }, (result.logs || []).length * 150 + 100);
            }
            
        } catch (err) {
            writeTerminalLog('stderr', '[ERROR] 通信过程发生重大异常: ' + err.message);
            showToast('❌ 同步发生严重通信故障', 'error');
        } finally {
            // 延迟重设按钮状态
            setTimeout(function() {
                setSyncingState(false);
            }, 1000);
        }
    }

    function getGitActionLabel(action) {
        var labels = {
            push: '本地覆盖远程',
            pull: '远程覆盖本地',
            remoteToLocalLocalFirst: '远程增加至本地（本地）',
            remoteToLocalRemoteFirst: '远程增量至本地（远程）'
        };
        return labels[action] || action;
    }

    function clearTerminal() {

    function writeTerminalLog(type, text) {
        var term = document.getElementById('gitTerminal');
        if (!term) return;
        
        var line = document.createElement('div');
        line.className = 'git-log-line ' + type;

        term.appendChild(line);
        term.scrollTop = term.scrollHeight;
    }
    
    // 核心流式打字机延迟喷吐日志算法
    async function renderLogsGradually(logs) {
        return new Promise(function(resolve) {
            if (!logs || logs.length === 0) {
                resolve();
                return;
            }
            
            var index = 0;
            function printNext() {
                if (index >= logs.length) {
                    resolve();
                    return;
                }
                var log = logs[index++];
                
                // 给命令行前缀打上特殊的渐进打字机呼吸感
                if (log.type === 'command') {
                    writeTerminalLog(log.type, log.text);
                    setTimeout(printNext, 180); // 命令打完稍作停顿

    // 黄色按钮：最小化 Terminal
    var isMinimized = false;

        function minimizeTerminal() {
        var terminal = document.querySelector('.terminal');
        var termFooter = document.querySelector('.term-footer');
        
        if (termFooter) termFooter.style.visibility = 'hidden';
        
        if (!isMinimized) {
            // 保存原始状态
            terminalOriginalState = {
                opacity: terminal.style.opacity || '1',
                transform: terminal.style.transform || 'none',
                margin: terminal.style.margin || '',
                position: terminal.style.position || '',
                left: terminal.style.left || '',
                top: terminal.style.top || '',
                width: terminal.style.width || ''
            };
            
            // 获取 terminal 位置和尺寸
            var rect = terminal.getBoundingClientRect();
            var startX = rect.left + rect.width / 2;
            var startY = rect.top + rect.height / 2;
            
            // 创建收缩圆圈 canvas
            var canvas = document.createElement('canvas');
            canvas.id = 'minimizeSwallowCanvas';
            canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;';
            document.body.appendChild(canvas);
            
            var ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            // 收缩动画参数 - 聚焦到屏幕上方的中心点
            var absorbDuration = 500;
            var startTime = performance.now();
            var maxRadius = Math.max(rect.width, rect.height) * 0.6;
            // 目标位置：屏幕正上方中心
            var targetX = window.innerWidth / 2;
            var targetY = window.innerHeight * 0.15; // 屏幕上方15%的位置
            
            function easeInOutCubic(t) {
                return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
            }
            
            function animateShrink(ts) {
                var elapsed = ts - startTime;
                var progress = Math.min(elapsed / absorbDuration, 1);
                var ease = easeInOutCubic(progress);
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // 计算当前位置（从原位置向目标位置移动）
                var currentX = startX + (targetX - startX) * ease;
                var currentY = startY + (targetY - startY) * ease;
                
                // 圆圈半径逐渐缩小
                var radius = maxRadius * (1 - ease);
                
                // 圆圈透明度：渐入渐出
                var alpha = 1;
                if (progress < 0.2) {
                    alpha = progress / 0.2;
                } else if (progress > 0.8) {
                    alpha = (1 - progress) / 0.2;
                }
                
                // 透明圆环从无限大向内收缩，包围并吞噬 Terminal
                if (alpha > 0.01) {
                    // 圆环只有边框，没有填充（中间透明）
                    ctx.beginPath();
                    ctx.arc(currentX, currentY, radius, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(255, 255, 255, ' + (alpha * 0.4) + ')';
                    ctx.lineWidth = 2 + (1 - progress) * 3; // 收缩时线条变粗
                    ctx.stroke();
                    
                    // 内层更淡的光晕
                    ctx.beginPath();
                    ctx.arc(currentX, currentY, radius * 0.95, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(255, 255, 255, ' + (alpha * 0.15) + ')';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
                
                // Terminal 跟随收缩并向上移动，逐渐透明消失
                var terminalScale = 1 - ease * 0.95;
                var terminalOpacity = 1 - ease; // 逐渐消失
                var terminalX = startX + (targetX - startX) * ease;
                var terminalY = startY + (targetY - startY) * ease;
                
                terminal.style.position = 'fixed';
                terminal.style.left = terminalX + 'px';
                terminal.style.top = terminalY + 'px';
                terminal.style.transform = 'translate(-50%, -50%) scale(' + terminalScale + ')';
                terminal.style.opacity = terminalOpacity;
                terminal.style.width = rect.width + 'px';
                terminal.style.transformOrigin = 'center center';
                termFooter.style.opacity = terminalOpacity;
                
                if (progress < 1) {
                    requestAnimationFrame(animateShrink);
                } else {
                    // 动画完成
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    canvas.remove();
                    
                    terminal.style.display = 'none';
                    terminal.style.transform = '';
                    terminal.style.opacity = '';
                    terminal.style.position = '';
                    terminal.style.left = '';
                    terminal.style.top = '';
                    terminal.style.width = '';
                    termFooter.style.display = 'none';
                    termFooter.style.opacity = '';
                    
                    isMinimized = true;
                    createMinimizeBall(targetY); // 小球从最终位置掉落
                }
            }
            
            requestAnimationFrame(animateShrink);
        }
    }
    
    // 创建收纳小球
    function createMinimizeBall(y) {
        // 移除已存在的 ball
        var existingBall = document.getElementById('minimizeBall');
        if (existingBall) existingBall.remove();
        
        var ball = document.createElement('div');

        ball.style.position = 'fixed';

        ball.style.top = '-60px';

        var availableStyles = [];
        for (var i = 1; i <= 3; i++) {

            if (styleName !== lastBallStyle) {
                availableStyles.push(i);
            }
        }
        // 如果只有一种可选，直接用它；否则随机选择
        var chosenIndex = availableStyles[Math.floor(Math.random() * availableStyles.length)];
        var ballStyle = 'style-' + chosenIndex;
        lastBallStyle = ballStyle; // 更新上一次使用的样式
        ball.className = ballStyle;

                    <div class="crystal-spark"></div>
                    <div class="crystal-spark"></div>
                    <div class="crystal-spark"></div>
                    <div class="crystal-spark"></div>
                </div>
                <div class="crystal-core"></div>
            `;
        }
        // 点击恢复 terminal
        ball.addEventListener('click', restoreTerminal);
        
        // 悬停时减慢速度
        var isHovered = false;
        ball.addEventListener('mouseenter', function() { isHovered = true; });
        ball.addEventListener('mouseleave', function() { isHovered = false; });
        
        // 重要：必须将小球添加到 body
        document.body.appendChild(ball);

        // 物理弹跳动画
        var ballSize = 60;
        var startX = window.innerWidth / 2 - ballSize / 2;
        var startY = 100;
        var velocityY = 0;
        var velocityX = (Math.random() - 0.5) * 8;
        var posY = startY;
        var posX = startX;
        var gravity = 0.4;
        var bounce = 0.7;
        var friction = 0.99;
        var groundY = window.innerHeight - ballSize - 30;
        
        // 弹性属性
        var elasticity = 0.85;
        var maxBounce = groundY - 80;
        
        // 从屏幕正中间上方开始掉落
        posX = window.innerWidth / 2 - ballSize / 2;
        posY = -ballSize; // 从屏幕顶部上方开始
        
        function animateBall(ts) {
            if (!document.getElementById('minimizeBall')) return;
            
            // 悬停时大幅减慢速度，但不是完全静止
            var timeScale = isHovered ? 0.08 : 1;
            
            velocityY += gravity * timeScale;
            posY += velocityY * timeScale;
            posX += velocityX * timeScale;
            
            // 边界反弹
            if (posY > maxBounce) {
                posY = maxBounce;
                velocityY = -velocityY * bounce;
                velocityX *= friction;
            }
            
            // 左右边界
            if (posX < 10 || posX > window.innerWidth - ballSize - 10) {
                velocityX = -velocityX * 0.8;
                posX = Math.max(10, Math.min(window.innerWidth - ballSize - 10, posX));
            }
            
            ball.style.left = posX + 'px';
            ball.style.top = posY + 'px';
            
            // 悬停时旋转变慢
            var rotationScale = isHovered ? 0.15 : 1;
            var rotation = velocityX * 2 * rotationScale;
            ball.style.transform = 'rotate(' + rotation + 'deg)';
            
            // 轻微悬浮动画（悬停时也变慢）
            if (Math.abs(velocityY) < 0.5 && Math.abs(velocityX) < 0.5) {
                velocityY = Math.sin(ts * 0.003) * 0.3 * timeScale;
            }
            
            requestAnimationFrame(animateBall);
        }
        
        requestAnimationFrame(animateBall);
    }
    
    // 恢复 Terminal
    function restoreTerminal() {
        var terminal = document.querySelector('.terminal');
        var termFooter = document.querySelector('.term-footer');
        var ball = document.getElementById('minimizeBall');
        
        if (!ball) return;
        
        // 球向上飞向屏幕中央上方
        var ballRect = ball.getBoundingClientRect();
        var targetY = -100;
        var targetX = window.innerWidth / 2 - 30;
        
        var startY = ballRect.top;
        var startX = ballRect.left;
        var startTime = performance.now();
        var duration = 500;
        
        function animateFly(ts) {
            var elapsed = ts - startTime;
            var progress = Math.min(elapsed / duration, 1);
            var easeProgress = 1 - Math.pow(1 - progress, 2);
            
            var currentY = startY + (targetY - startY) * easeProgress;
            var currentX = startX + (targetX - startX) * easeProgress;
            ball.style.top = currentY + 'px';
            ball.style.left = currentX + 'px';
            ball.style.opacity = 1 - progress;
            ball.style.transform = 'scale(' + (1 - progress * 0.5) + ')';
            
            if (progress < 1) {
                requestAnimationFrame(animateFly);
            } else {
                ball.remove();
                
                // 恢复 terminal
                terminal.style.display = '';
                terminal.style.opacity = '';
                terminal.style.transform = '';
                terminal.style.position = '';
                terminal.style.left = '';
                terminal.style.top = '';
                terminal.style.width = '';
                terminal.style.margin = '';
                termFooter.style.display = '';
                termFooter.style.visibility = '';
                
                // 淡入效果
                terminal.style.opacity = '0';
                terminal.style.transition = 'opacity 0.3s ease';
                setTimeout(function() {
                    terminal.style.opacity = '1';
                    setTimeout(function() {
                        terminal.style.transition = '';
                    }, 300);
                }, 50);
                
                isMinimized = false;
            }
        }
        
        requestAnimationFrame(animateFly);
    }

    function typeWriterEffect(msgDiv, text) {
        if (!msgDiv || !text) return;
        const contentEl = msgDiv.querySelector('.ai-message-content');
        if (!contentEl) return;

        let index = 0;
        const speed = 30; // 每个字符间隔 30ms

        function type() {
            if (!document.body.contains(msgDiv)) return;
            if (index < text.length) {
                if (typeof marked !== 'undefined') {
                    try {
                        const partialText = text.substring(0, index + 1);
                        contentEl.innerHTML = marked.parse(partialText);
                    } catch (e) {
                        contentEl.textContent = text.substring(0, index + 1);
                    }
                } else {
                    contentEl.textContent = text.substring(0, index + 1);
                }
                index++;
                const msgList = document.getElementById('aiMessageList');
                if (msgList) msgList.scrollTop = msgList.scrollHeight;
                setTimeout(type, speed);
            }
        }

        type();
    }

    const AI_STORAGE_KEY = 'terminal_blog_ai_messages';
    const AI_POST_MARKER_RE = /\s*<!--\s*post:([^|>]+)(?:\|summary)?\s*-->\s*$/;

    function getActivePostId() {
        if (currentView === 'post' && currentSlug) return String(currentSlug);
        return getCurrentPostIdFromUrl();
    }

    function getCurrentAIPageContext() {
        return {
            view: currentView || 'home',
            postId: isOnPostPage() ? getActivePostId() : null,
            tag: currentView === 'tag' ? (currentTag || '') : '',
            path: window.location.pathname,
            title: document.title || ''
        };
    }

    function stripAIMessageMetadata(content) {
        return String(content || '')
            .replace(/\s*<!--\s*post:[^>]+\s*-->\s*$/, '')
            .replace(/\s*<!-- \/[^/]+\/ -->\s*$/, '');
    }

    function buildAIMessageContent(content, options) {
        const opts = options || {};
        let savedContent = stripAIMessageMetadata(content);
        if (opts.postId) {
            savedContent += `<!-- post:${opts.postId}${opts.summary ? '|summary' : ''} -->`;
        }
        return savedContent;
    }

    function getAIMessagePostId(content) {
        const modern = String(content || '').match(AI_POST_MARKER_RE);
        if (modern) return modern[1];
        const legacy = String(content || '').match(/<!-- \/([^/]+)\/ -->\s*$/);
        return legacy ? legacy[1] : null;
    }

    function isAIMessageSummary(content) {
        const value = String(content || '');
        return /\s*<!--\s*post:[^|>]+\|summary\s*-->\s*$/.test(value) || /<!-- \/[^/]+\/ -->\s*$/.test(value);
    }

    function saveAIMessage(role, content, options) {
        const opts = options || {};
        const savedContent = role === 'ai'
            ? buildAIMessageContent(content, opts)
            : stripAIMessageMetadata(content);
        aiMessages.push({ role: role, content: savedContent });
        saveAIMessages();
    }

    function getVisibleAIMessages() {
        return aiMessages
            .filter((msg) => msg && (msg.role === 'user' || msg.role === 'ai'))
            .map((msg) => ({
                role: msg.role,
                content: stripAIMessageMetadata(msg.content)
            }))
            .filter((msg) => msg.content);
    }

    function saveAIMessages() {
        try {
            localStorage.setItem(AI_STORAGE_KEY, JSON.stringify(aiMessages));
        } catch (e) {
            console.error('保存 AI 聊天记录失败:', e);
        }
    }

    function loadAIMessages() {
        try {
            const saved = localStorage.getItem(AI_STORAGE_KEY);
            if (saved) {
                const parsed = JSON.parse(saved);
                if (Array.isArray(parsed)) {
                    aiMessages = parsed;
                }
            }
        } catch (e) {
            console.error('加载 AI 聊天记录失败:', e);
            aiMessages = [];
            clearAISavedMessages();

    function clearAISavedMessages() {

    function isOnPostPage() {
        if (currentView === 'post' && currentSlug) return true;
        const path = window.location.pathname;
        if (path === '/' || path === '/index.html' || path === '') return false;
        if (path.startsWith('/api/') || path.startsWith('/config.js')) return false;
        return /^\/[a-zA-Z0-9_-]+\/?$/.test(path);
    }

    function getCurrentPostIdFromUrl() {
        const path = window.location.pathname;
        const match = path.match(/^\/([a-zA-Z0-9_-]+)\/?$/);
        return match ? match[1] : null;

    // 检查聊天记录中是否已有当前文章的总结（通过文章 URL 识别）
    function hasPostSummary() {
        if (!isOnPostPage()) return false;

        const postSlug = getActivePostId();
        if (!postSlug) return false;
        return aiMessages.some((msg) => (
            msg.role === 'ai' &&
            getAIMessagePostId(msg.content) === postSlug &&
            isAIMessageSummary(msg.content)
        ));

    // 获取文章标题用于总结提示
    function getPostSummaryPrompt(postTitle, postContent) {
        // 截取前2000字符作为摘要材料
        const contentPreview = postContent.length > 2000 
            ? postContent.substring(0, 2000) + '...' 
            : postContent;
        
        const prompts = [
            `当前打开的这篇文章是《${postTitle}》，以下是文章摘要：\n\n${contentPreview}\n\n请用简洁的语言为读者总结这篇文章的主要内容。`,
            `当前打开的这篇文章是《${postTitle}》，以下是文章摘要：\n\n${contentPreview}\n\n请为读者简要介绍这篇文章在讲什么。`
        ];
        
        return prompts[Math.floor(Math.random() * prompts.length)];
    }

    // 自动总结当前文章
    async function autoSummarizePost() {
        const postId = getActivePostId();
        if (!postId || pendingAutoSummaries.has(postId) || hasPostSummary()) return;
        pendingAutoSummaries.add(postId);
        const requestVersion = aiHistoryVersion;

        try {
            const config = window.AI_CONFIG || {};
            if (!config.apiKey) {
                console.log('AI 未配置 API Key，跳过自动总结');
                return;
            }

            const post = await apiGet('/post/' + postId);
            if (!post || !post.content) {
                console.log('无法获取文章内容，跳过自动总结');
                return;
            }

            const summaryPrompt = getPostSummaryPrompt(post.title || '未命名文章', post.content || '');

            const msgList = document.getElementById('aiMessageList');
            const welcome = msgList ? msgList.querySelector('.ai-welcome') : null;
            if (welcome) welcome.remove();

            beginAIRequest();

            const response = await fetch('/api/ai/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    messages: [],
                    message: summaryPrompt,
                    currentPostId: postId,
                    currentPage: getCurrentAIPageContext(),
                    hiddenRequest: true
                })
            });

            const data = await response.json();
            if (!response.ok) {
                showAIError('❌ ' + (data.error || '请求失败'));
                return;
            }

            if (data.error) {
                showAIError('❌ ' + data.error);
                return;
            }

            const replyText = data.reply || '抱歉，无法生成总结。';
            if (requestVersion !== aiHistoryVersion) return;
            saveAIMessage('ai', replyText, { postId: postId, summary: true });
            renderAIMessage('ai', replyText, { animate: replyText.length >= 200 });
        } catch (err) {
            console.error('自动总结失败:', err);
        } finally {
            pendingAutoSummaries.delete(postId);
            endAIRequest();
        }
    }

        document.body.appendChild(aiModal);
        document.body.style.overflow = 'hidden';

        // 渲染历史消息（如果有的话）
        if (aiMessages.length > 0) {
            const msgList = document.getElementById('aiMessageList');
            if (msgList) {
                const welcome = msgList.querySelector('.ai-welcome');
                if (welcome) welcome.remove();

                aiMessages.forEach(function(msg) {
                    if (msg.role === 'user' || msg.role === 'ai') {
                        renderAIMessage(msg.role, stripAIMessageMetadata(msg.content), { save: false });
                    }
                });

                msgList.scrollTop = msgList.scrollHeight;
            }
        }
        if (pendingAIRequests > 0) {
            showAITyping();
        }

        const input = document.getElementById('aiInput');
        if (input) {
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendAIMessage();
                }
            });
            input.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });
            setTimeout(() => input.focus(), 100);
        }

        if (shouldAutoSummarize) {
            setTimeout(() => autoSummarizePost(), 300);
        }
    }

    function closeAIModal() {
        if (aiModal) {
            aiModal.remove();
            aiModal = null;
        }
        document.body.style.overflow = '';
    }

    function clearAIMessages() {
        const config = window.AI_CONFIG || {};
        const uiConfig = config.ui || {};
        const showWelcome = uiConfig.showWelcome !== false;
        const welcomeMsg = uiConfig.welcomeMessage || '你好！我是 TerminalBlog 的 AI 助手，可以帮你解答关于博客内容的问题，有什么想了解的吗？';

        aiMessages = [];
        aiHistoryVersion++;
        clearAISavedMessages();
        pendingAutoSummaries.clear();

        const msgList = document.getElementById('aiMessageList');
        if (msgList) {
            if (showWelcome) {
                msgList.innerHTML = `
                    <div class="ai-welcome">
                        <div class="ai-welcome-icon">🤖</div>
                        <div class="ai-welcome-title">TerminalBlog AI</div>
                        <div class="ai-welcome-desc">${escapeHtml(welcomeMsg)}</div>
                    </div>
                `;
            } else {
                msgList.innerHTML = '';
            }
        }
    }

    function renderMarkdownContent(content) {
        if (typeof marked !== 'undefined') {
            try {
                return marked.parse(content);
            } catch (e) {
                return '<pre style="white-space:pre-wrap;">' + escapeHtml(content) + '</pre>';
            }
        }
        return '<pre style="white-space:pre-wrap;">' + escapeHtml(content) + '</pre>';
    }

    function renderAIMessage(role, content, options) {
        const opts = options || {};
        const msgList = document.getElementById('aiMessageList');
        if (!msgList) return null;

        const welcome = msgList.querySelector('.ai-welcome');
        if (welcome) welcome.remove();

        const avatar = role === 'user' ? '👤' : '🤖';
        const msgDiv = document.createElement('div');
        msgDiv.className = 'ai-message ' + role;

        const renderedContent = role === 'user' ? escapeHtml(content) : (opts.animate ? '' : renderMarkdownContent(content));
        msgDiv.innerHTML = `
            <div class="ai-message-avatar">${avatar}</div>
            <div class="ai-message-content">${renderedContent}</div>
        `;
        msgList.appendChild(msgDiv);
        msgList.scrollTop = msgList.scrollHeight;

        if (opts.animate && role === 'ai') {
            typeWriterEffect(msgDiv, content);
        }
        return msgDiv;
    }

    function addAIMessage(role, content, options) {
        const opts = options || {};
        const postId = opts.postId || (role === 'ai' && isOnPostPage() ? getActivePostId() : null);
        renderAIMessage(role, content, opts);
        if (opts.save !== false) {
            saveAIMessage(role, content, {
                postId: postId,
                summary: !!opts.summary
            });
        }
    }

    function showAITyping() {
        const msgList = document.getElementById('aiMessageList');
        if (!msgList) return;
        if (document.getElementById('aiTypingIndicator')) return;

        const typingDiv = document.createElement('div');
        typingDiv.className = 'ai-message ai';
        typingDiv.id = 'aiTypingIndicator';
        typingDiv.innerHTML = `
            <div class="ai-message-avatar">🤖</div>
            <div class="ai-message-content">
                <div class="ai-typing">
                    <div class="ai-typing-dots"><span></span><span></span><span></span></div>
                    <span>思考中...</span>
                </div>
            </div>
        `;
        msgList.appendChild(typingDiv);
        msgList.scrollTop = msgList.scrollHeight;
        isAiTyping = true;
    }

    function hideAITyping() {
        const typing = document.getElementById('aiTypingIndicator');
        if (typing) typing.remove();
        isAiTyping = false;
    }

    function beginAIRequest() {
        pendingAIRequests++;
        showAITyping();
    }

    function endAIRequest() {
        pendingAIRequests = Math.max(0, pendingAIRequests - 1);
        if (pendingAIRequests === 0) {
            hideAITyping();
        }
    }

    function showAIError(message) {
        const msgList = document.getElementById('aiMessageList');
        if (!msgList) return;

        const errDiv = document.createElement('div');
        errDiv.className = 'ai-error';
        errDiv.textContent = message;
        msgList.appendChild(errDiv);
        msgList.scrollTop = msgList.scrollHeight;
    }

    async function sendAIMessage() {
        const input = document.getElementById('aiInput');
        const sendBtn = document.getElementById('aiSendBtn');
        if (!input || !sendBtn) return;

        const content = input.value.trim();
        if (!content || isAiTyping) return;

        const config = window.AI_CONFIG || {};
        if (!config.apiKey) {
            showAIError('⚠️ AI 未配置 API Key，请在 config.js 中设置');
            return;
        }

        input.value = '';
        input.style.height = 'auto';

        addAIMessage('user', content);

        beginAIRequest();
        sendBtn.disabled = true;

        const currentPostId = isOnPostPage() ? getActivePostId() : null;
        const historyMessages = getVisibleAIMessages();
        if (historyMessages.length && historyMessages[historyMessages.length - 1].role === 'user') {
            historyMessages.pop();
        }
        const requestVersion = aiHistoryVersion;

        try {
            const response = await fetch('/api/ai/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    messages: historyMessages,
                    message: content,
                    currentPostId: currentPostId,
                    currentPage: getCurrentAIPageContext()
                })
            });

            const data = await response.json();

            if (!response.ok) {
                showAIError('❌ ' + (data.error || '请求失败'));
                return;
            }

            if (data.error) {
                showAIError('❌ ' + data.error);
                return;
            }

            const replyText = data.reply || '抱歉，我没有理解您的问题。';
            if (requestVersion !== aiHistoryVersion) return;
            saveAIMessage('ai', replyText, { postId: currentPostId });
            renderAIMessage('ai', replyText, { animate: replyText.length >= 200 });

        } catch (err) {
            showAIError('❌ 网络错误: ' + err.message);
        } finally {
            endAIRequest();
            if (sendBtn) sendBtn.disabled = false;
            if (input) input.focus();
        }
    }

    render();

    // ============ AI 按钮首次加载 — 高科技线性光晕/星芒效果 ============
    (function initTechLensEffect() {
        // 每次浏览器会话（标签页）只触发一次
        var STORAGE_KEY = 'ai_corona_shown';
        if (sessionStorage.getItem(STORAGE_KEY)) return;
        sessionStorage.setItem(STORAGE_KEY, '1');

        // 延迟执行，等待 DOM 布局完成
        setTimeout(function() {
            var aiBtn = document.getElementById('aiBtn');
            var canvas = document.getElementById('ai-ripple-canvas');
            if (!aiBtn || !canvas) return;

            var ctx = canvas.getContext('2d');
            var dpr = window.devicePixelRatio || 1;

            // 高分辨率屏幕适配
            canvas.width  = window.innerWidth  * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width  = window.innerWidth  + 'px';
            canvas.style.height = window.innerHeight + 'px';
            ctx.scale(dpr, dpr);

            var W = window.innerWidth;
            var H = window.innerHeight;

            // 以 AI 按钮中心为光晕原点（动态更新以跟随滚动）
            function updateButtonPosition() {
                var btnRect = aiBtn.getBoundingClientRect();
                var newCx = btnRect.left + btnRect.width  / 2;
                var newCy = btnRect.top  + btnRect.height / 2;
                
                // 动态更新最大扩散半径
                maxDist = Math.sqrt(
                    Math.pow(Math.max(newCx, W - newCx), 2) +
                    Math.pow(Math.max(newCy, H - newCy), 2)
                ) * 1.15;
                
                return { cx: newCx, cy: newCy };
            }
            
            var maxDist = 0;
            var btnPos = updateButtonPosition();
            var cx = btnPos.cx;
            var cy = btnPos.cy;

            // 参数配置
            var TOTAL_DURATION = 4800;  // 总动画时长 ms
            var FADE_OUT_AT    = 3600;  // 从此刻开始全局淡出

            // 六边形顶点计算（几何幽灵影）
            function getHexagonPoints(cx, cy, radius, rotation) {
                var points = [];
                for (var i = 0; i < 6; i++) {
                    var angle = (Math.PI / 3) * i + rotation - Math.PI / 2;
                    points.push({
                        x: cx + radius * Math.cos(angle),
                        y: cy + radius * Math.sin(angle)
                    });
                }
                return points;
            }

            function drawHexagon(cx, cy, radius, rotation) {
                var points = getHexagonPoints(cx, cy, radius, rotation);
                ctx.beginPath();
                ctx.moveTo(points[0].x, points[0].y);
                for (var i = 1; i < 6; i++) {
                    ctx.lineTo(points[i].x, points[i].y);
                }
                ctx.closePath();
            }

            // 绘制星芒光线
            function drawStarBurst(cx, cy, count, innerRadius, outerRadius, alpha, rotation, colorRGB) {
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(rotation);

                for (var i = 0; i < count; i++) {
                    var angle = (Math.PI * 2 / count) * i;
                    var pulseOffset = Math.sin(i * 0.7 + Date.now() * 0.003) * 0.15;

                    // 光线渐变
                    var rayLen = outerRadius * (0.8 + pulseOffset);
                    var rayGrad = ctx.createLinearGradient(
                        Math.cos(angle) * innerRadius,
                        Math.sin(angle) * innerRadius,
                        Math.cos(angle) * rayLen,
                        Math.sin(angle) * rayLen
                    );
                    rayGrad.addColorStop(0, 'rgba(' + colorRGB[0] + ',' + colorRGB[1] + ',' + colorRGB[2] + ',' + (alpha * 0.9) + ')');
                    rayGrad.addColorStop(0.3, 'rgba(' + colorRGB[0] + ',' + colorRGB[1] + ',' + colorRGB[2] + ',' + (alpha * 0.6) + ')');
                    rayGrad.addColorStop(0.7, 'rgba(' + colorRGB[0] + ',' + colorRGB[1] + ',' + colorRGB[2] + ',' + (alpha * 0.2) + ')');
                    rayGrad.addColorStop(1, 'rgba(' + colorRGB[0] + ',' + colorRGB[1] + ',' + colorRGB[2] + ',0)');

                    // 主光线
                    ctx.beginPath();
                    ctx.moveTo(Math.cos(angle) * innerRadius, Math.sin(angle) * innerRadius);
                    ctx.lineTo(Math.cos(angle) * rayLen, Math.sin(angle) * rayLen);
                    ctx.strokeStyle = rayGrad;
                    ctx.lineWidth = 2.5 * (1 - i / count * 0.3);
                    ctx.lineCap = 'round';
                    ctx.stroke();

                    // 光线外缘发光
                    ctx.beginPath();
                    ctx.moveTo(Math.cos(angle) * innerRadius, Math.sin(angle) * innerRadius);
                    ctx.lineTo(Math.cos(angle) * rayLen, Math.sin(angle) * rayLen);
                    ctx.strokeStyle = 'rgba(' + colorRGB[0] + ',' + colorRGB[1] + ',' + colorRGB[2] + ',' + (alpha * 0.15) + ')';
                    ctx.lineWidth = 8;
                    ctx.stroke();
                }

                ctx.restore();
            }

            var startTime = null;

            function draw(ts) {
                if (!startTime) startTime = ts;
                var elapsed = ts - startTime;

                // 动画结束 — 清理画布并隐藏
                if (elapsed >= TOTAL_DURATION) {
                    ctx.clearRect(0, 0, W, H);
                    canvas.style.display = 'none';
                    return;
                }

                // 动态更新 AI 按钮位置（跟随滚动）
                var btnPos = updateButtonPosition();
                cx = btnPos.cx;
                cy = btnPos.cy;

                ctx.clearRect(0, 0, W, H);

                // 全局淡出系数
                var gFade = elapsed > FADE_OUT_AT
                    ? 1 - (elapsed - FADE_OUT_AT) / (TOTAL_DURATION - FADE_OUT_AT)
                    : 1;

                // 轻微呼吸效果
                var breathe = Math.sin(elapsed * 0.003) * 0.5 + 0.5;
                var hexRotation = elapsed * 0.0003;  // 六边形缓慢旋转
                var burstRotation = elapsed * 0.0008;  // 星芒旋转

                // ======== 内层六边形（实线）=======
                {
                    var innerAlpha = Math.min(1, elapsed / 400) * 0.4 * gFade;
                    // 从 3000ms 开始渐隐（不再突然消失）
                    if (elapsed > 3000) {
                        innerAlpha = innerAlpha * Math.max(0, 1 - (elapsed - 3000) / 1200);
                    }
                    if (innerAlpha > 0.005) {
                        var innerRadius = 40 + Math.min(elapsed, 3000) * 0.015;
                        drawHexagon(cx, cy, innerRadius, hexRotation * 1.5);
                        ctx.strokeStyle = 'rgba(210, 168, 255,' + innerAlpha + ')';
                        ctx.lineWidth = 2;
                        ctx.stroke();

                        // 内层六边形填充
                        var innerGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, innerRadius);
                        innerGrad.addColorStop(0, 'rgba(210, 168, 255,' + (innerAlpha * 0.3) + ')');
                        innerGrad.addColorStop(1, 'rgba(210, 168, 255,0)');
                        ctx.fillStyle = innerGrad;
                        ctx.fill();
                    }
                }

                // ======== 强星光芒（12方向） ========
                if (elapsed > 200) {
                    var burstAlpha = Math.min(1, (elapsed - 200) / 600) * 0.35 * gFade;
                    var burstRadius = maxDist * (0.25 + elapsed * 0.0008);
                    // 青色星芒
                    drawStarBurst(cx, cy, 12, 20, burstRadius * 1.2, burstAlpha * 0.7, burstRotation, [0, 229, 255]);
                }

                // ======== 二次星芒（6方向，长光线） ========
                if (elapsed > 400) {
                    var burst2Alpha = Math.min(1, (elapsed - 400) / 500) * 0.25 * gFade;
                    var burst2Radius = maxDist * (0.4 + elapsed * 0.001);
                    // 绿色星芒
                    drawStarBurst(cx, cy, 6, 30, burst2Radius, burst2Alpha, -burstRotation * 0.6, [0, 255, 65]);
                }

                // ======== 太阳核心 — 明亮但不刺眼 ========
                if (elapsed < 3500) {
                    // 核心亮度曲线：快速亮起 → 轻微呼吸 → 平滑消散
                    var coreT;
                    if (elapsed < 300) {
                        coreT = elapsed / 300;  // 快速亮起
                    } else if (elapsed < 2200) {
                        coreT = 0.9 + Math.sin((elapsed - 300) * 0.004) * 0.1;  // 轻微呼吸
                    } else {
                        coreT = Math.max(0, 0.85 - (elapsed - 2200) / 1300);  // 缓慢消散
                    }

                    var coreA = coreT * 0.9 * gFade;
                    var coreR = 18 + coreT * 12;

                    // 最内核 — 纯白光（高科技镜头质感）
                    var innerCore = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreR);
                    innerCore.addColorStop(0,   'rgba(255, 255, 255, ' + (coreA * 0.95) + ')');
                    innerCore.addColorStop(0.2, 'rgba(240, 250, 255, ' + (coreA * 0.8) + ')');
                    innerCore.addColorStop(0.5, 'rgba(200, 230, 255, ' + (coreA * 0.5) + ')');
                    innerCore.addColorStop(1,   'rgba(150, 200, 255, 0)');
                    ctx.fillStyle = innerCore;
                    ctx.beginPath();
                    ctx.arc(cx, cy, coreR, 0, Math.PI * 2);
                    ctx.fill();

                    // 第二层 — 青色光晕（高科技蓝色调）
                    var techHalo = ctx.createRadialGradient(cx, cy, coreR * 0.4, cx, cy, coreR * 2.5);
                    techHalo.addColorStop(0,   'rgba(0, 229, 255, ' + (coreA * 0.4) + ')');
                    techHalo.addColorStop(0.4, 'rgba(0, 200, 255, ' + (coreA * 0.2) + ')');
                    techHalo.addColorStop(1,   'rgba(0, 150, 200, 0)');
                    ctx.fillStyle = techHalo;
                    ctx.beginPath();
                    ctx.arc(cx, cy, coreR * 2.5, 0, Math.PI * 2);
                    ctx.fill();

                    // 十字星芒（中心高光）
                    var crossAlpha = coreA * 0.5;
                    var crossLen = coreR * 3;
                    ctx.save();
                    ctx.translate(cx, cy);
                    ctx.rotate(burstRotation * 0.5);

                    // 横线
                    var crossGradH = ctx.createLinearGradient(-crossLen, 0, crossLen, 0);
                    crossGradH.addColorStop(0, 'rgba(255,255,255,0)');
                    crossGradH.addColorStop(0.4, 'rgba(255,255,255,' + (crossAlpha * 0.3) + ')');
                    crossGradH.addColorStop(0.5, 'rgba(255,255,255,' + crossAlpha + ')');
                    crossGradH.addColorStop(0.6, 'rgba(255,255,255,' + (crossAlpha * 0.3) + ')');
                    crossGradH.addColorStop(1, 'rgba(255,255,255,0)');
                    ctx.beginPath();
                    ctx.moveTo(-crossLen, 0);
                    ctx.lineTo(crossLen, 0);
                    ctx.strokeStyle = crossGradH;
                    ctx.lineWidth = 3;
                    ctx.stroke();

                    // 竖线
                    var crossGradV = ctx.createLinearGradient(0, -crossLen, 0, crossLen);
                    crossGradV.addColorStop(0, 'rgba(255,255,255,0)');
                    crossGradV.addColorStop(0.4, 'rgba(255,255,255,' + (crossAlpha * 0.3) + ')');
                    crossGradV.addColorStop(0.5, 'rgba(255,255,255,' + crossAlpha + ')');
                    crossGradV.addColorStop(0.6, 'rgba(255,255,255,' + (crossAlpha * 0.3) + ')');
                    crossGradV.addColorStop(1, 'rgba(255,255,255,0)');
                    ctx.beginPath();
                    ctx.moveTo(0, -crossLen);
                    ctx.lineTo(0, crossLen);
                    ctx.strokeStyle = crossGradV;
                    ctx.lineWidth = 3;
                    ctx.stroke();

                    ctx.restore();
                }

                // ======== 线性光晕边缘（高科技扫描线效果） ========
                if (elapsed > 100 && elapsed < 4000) {
                    var lineAlpha = Math.min(1, (elapsed - 100) / 300) * 0.15 * gFade;
                    var lineCount = 24;
                    ctx.save();
                    ctx.globalCompositeOperation = 'screen';

                    for (var i = 0; i < lineCount; i++) {
                        var lineAngle = (Math.PI * 2 / lineCount) * i + hexRotation;
                        var lineLen = maxDist * (0.6 + Math.sin(i * 0.8 + elapsed * 0.002) * 0.2);
                        var lineAlphaMod = lineAlpha * (0.5 + Math.sin(i * 1.2 + elapsed * 0.003) * 0.5);

                        var lineGrad = ctx.createLinearGradient(
                            cx, cy,
                            cx + Math.cos(lineAngle) * lineLen,
                            cy + Math.sin(lineAngle) * lineLen
                        );
                        lineGrad.addColorStop(0, 'rgba(0, 229, 255,' + (lineAlphaMod * 0.8) + ')');
                        lineGrad.addColorStop(0.5, 'rgba(0, 255, 65,' + (lineAlphaMod * 0.4) + ')');
                        lineGrad.addColorStop(1, 'rgba(0, 229, 255,0)');

                        ctx.beginPath();
                        ctx.moveTo(cx, cy);
                        ctx.lineTo(
                            cx + Math.cos(lineAngle) * lineLen,
                            cy + Math.sin(lineAngle) * lineLen
                        );
                        ctx.strokeStyle = lineGrad;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }

                    ctx.restore();
                }

                requestAnimationFrame(draw);
            }

            requestAnimationFrame(draw);
        }, 1200); // 延迟 1.2 秒，让页面内容先渲染
    })();

    </script>
