server {
    listen 80;
    server_name blog.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name blog.yourdomain.com;

    # ---------- SSL 证书（请修改为实际路径） ----------
    ssl_certificate     /etc/ssl/certs/blog_yourdomain_com.pem;
    ssl_certificate_key /etc/ssl/private/blog_yourdomain_com.key;

    # ---------- 现代 TLS 配置 ----------
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ---------- 安全响应头 ----------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options        SAME_ORIGIN  always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ---------- 日志 ----------
    access_log /var/log/nginx/terminal-blog_access.log;
    error_log  /var/log/nginx/terminal-blog_error.log;

    # ---------- 上传限制 ----------
    client_max_body_size 10M;
    client_body_timeout 60s;

    # ---------- 反代本地 Worker dev 服务（端口 8788） ----------
    location / {
        proxy_pass http://127.0.0.1:8788;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # 关闭缓存，确保 SPA 前端路由始终返回 index.html
        proxy_cache off;

        # WebSocket 支持（管理后台实时预览等场景）
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ---------- 静态资源（如果直接托管 public/ 目录） ----------
    # location /public/ {
    #     alias /path/to/CloudflareBlog/public/;
    #     expires 30d;
    #     add_header Cache-Control "public, immutable";
    # }

    # ---------- 禁止访问敏感文件 ----------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ---------- 静态资源缓存（如果不需要动态反代可开启） ----------
    # location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
    #     proxy_pass http://127.0.0.1:8788;
    #     proxy_cache_valid 200 30d;
    #     add_header Cache-Control "public, max-age=2592000";
    #     proxy_cache off;
    # }
}